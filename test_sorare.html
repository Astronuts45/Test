<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧪 Test API Sorare</title>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080a0f; --surface: #0c0f1a; --card: #111520;
  --border: #1a2035; --accent: #c9a84c; --green: #10b981;
  --red: #f43f5e; --text: #e8eaf0; --sub: #4a5568; --sub2: #718096;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Figtree',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding:20px; }
h1 { color:var(--accent); font-size:20px; margin-bottom:20px; }
.card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:16px; margin-bottom:16px; }
.card h2 { font-size:14px; color:var(--sub2); margin-bottom:12px; text-transform:uppercase; letter-spacing:.5px; }
input, select { width:100%; padding:8px 12px; background:var(--surface); border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:13px; margin-bottom:8px; }
button { padding:10px 20px; border:none; border-radius:8px; cursor:pointer; font-size:13px; font-weight:600; }
.btn-primary { background:var(--accent); color:#000; }
.btn-green   { background:var(--green); color:#fff; }
.btn-ghost   { background:transparent; border:1px solid var(--border); color:var(--text); }
.result { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:12px; margin-top:12px; font-size:12px; font-family:monospace; white-space:pre-wrap; min-height:40px; color:var(--sub2); }
.result.ok  { border-color:var(--green); color:var(--green); }
.result.err { border-color:var(--red);   color:var(--red); }
.grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:8px; }
.stat { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:10px; text-align:center; }
.stat-val { font-size:22px; font-weight:700; color:var(--accent); }
.stat-lbl { font-size:10px; color:var(--sub2); margin-top:2px; }
.tag { display:inline-block; padding:2px 8px; border-radius:20px; font-size:11px; margin:2px; }
.tag-rw  { background:rgba(59,130,246,.15); color:#60a5fa; border:1px solid rgba(59,130,246,.3); }
.tag-ok  { background:rgba(16,185,129,.15); color:var(--green); border:1px solid rgba(16,185,129,.3); }
.tag-err { background:rgba(244,63,94,.15);  color:var(--red);   border:1px solid rgba(244,63,94,.3); }
#batchLog { max-height:200px; overflow-y:auto; }
</style>
</head>
<body>

<h1>🧪 Test API Sorare — MLB</h1>

<!-- TEST 1 : Joueur individuel -->
<div class="card">
  <h2>1. Joueur individuel</h2>
  <input type="text" id="slugInput" value="kyle-schwarber-19930305" placeholder="slug (ex: kyle-schwarber-19930305)">
  <div style="display:flex;gap:8px">
    <button class="btn-primary" onclick="testPlayer()">🔍 Tester</button>
    <button class="btn-ghost" onclick="document.getElementById('slugInput').value='jose-ramirez-19920917'">Ramirez</button>
    <button class="btn-ghost" onclick="document.getElementById('slugInput').value='shohei-ohtani-19940705'">Ohtani</button>
    <button class="btn-ghost" onclick="document.getElementById('slugInput').value='david-bednar-19941002'">Bednar</button>
  </div>
  <div id="playerResult" class="result">En attente...</div>
</div>

<!-- TEST 2 : Batch plusieurs joueurs -->
<div class="card">
  <h2>2. Batch — plusieurs slugs</h2>
  <textarea id="batchInput" style="width:100%;padding:8px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;height:80px;resize:vertical;margin-bottom:8px">kyle-schwarber-19930305
jose-ramirez-19920917
shohei-ohtani-19940705
tarik-skubal-19961120
david-bednar-19941002</textarea>
  <div style="display:flex;gap:8px;align-items:center">
    <button class="btn-green" onclick="testBatch()">⚡ Tester le batch</button>
    <span id="batchStatus" style="font-size:12px;color:var(--sub2)"></span>
  </div>
  <div id="batchLog" class="result" style="margin-top:12px">En attente...</div>
</div>

<!-- TEST 3 : Vitesse / rate limit -->
<div class="card">
  <h2>3. Test vitesse & rate limit</h2>
  <p style="font-size:12px;color:var(--sub2);margin-bottom:10px">Teste combien de requêtes par seconde l'API accepte avant de throttler.</p>
  <div style="display:flex;gap:8px;align-items:center">
    <button class="btn-ghost" onclick="testRateLimit()">🚀 Lancer</button>
    <span id="rateStatus" style="font-size:12px;color:var(--sub2)"></span>
  </div>
  <div id="rateResult" class="result">En attente...</div>
</div>

<script>
const ENDPOINT = 'https://api.sorare.com/federation/graphql';

async function gql(query) {
  const res = await fetch(ENDPOINT, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
    body: JSON.stringify({ query })
  });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return await res.json();
}

async function testPlayer() {
  const slug = document.getElementById('slugInput').value.trim();
  const result = document.getElementById('playerResult');
  result.className = 'result';
  result.textContent = '🔄 Requête en cours...';

  const query = `{
    baseballPlayer(slug: "${slug}") {
      displayName
      slug
      nextClassicFixtureProjectedScore
      nextDailyFixtureProjectedScore
      hitterAverageScore(type: LAST_FIFTEEN_PLAYED)
      pitcherAverageScore(type: LAST_FIFTEEN_PLAYED)
      hitterAverageScore(type: LAST_FIVE_PLAYED)
      pitcherAverageScore(type: LAST_FIVE_PLAYED)
      injuries { active description }
      nextGame { ... on GameOfBaseball { 
        startDate
        homeTeam { slug }
        awayTeam { slug }
      }}
    }
  }`;

  try {
    const t0 = Date.now();
    const data = await gql(query);
    const ms = Date.now() - t0;

    if (data.errors) {
      result.className = 'result err';
      result.textContent = '❌ Erreur API :\n' + JSON.stringify(data.errors, null, 2);
      return;
    }

    const p = data?.data?.baseballPlayer;
    if (!p) {
      result.className = 'result err';
      result.textContent = `❌ Joueur introuvable : "${slug}"`;
      return;
    }

    const rwClassic = p.nextClassicFixtureProjectedScore;
    const rwDaily   = p.nextDailyFixtureProjectedScore;
    const avg15h    = p.hitterAverageScore;
    const avg5h     = p.pitcherAverageScore; // sera null si hitter
    const inj       = p.injuries?.filter(i => i.active) || [];
    const game      = p.nextGame;

    let txt = `✅ ${p.displayName} (${ms}ms)\n\n`;
    txt += `🎯 Projection RW :\n`;
    txt += `  Classic : ${rwClassic?.toFixed(1) ?? 'N/A'}\n`;
    txt += `  Daily   : ${rwDaily?.toFixed(1)   ?? 'N/A'}\n\n`;
    txt += `📊 Scores moyens :\n`;
    txt += `  Avg 15 matchs : ${avg15h?.toFixed(1) ?? 'N/A'}\n`;
    txt += `  Avg 5 matchs  : ${avg5h?.toFixed(1)  ?? 'N/A'}\n\n`;
    if (inj.length) txt += `🤕 Blessure : ${inj[0].description}\n\n`;
    if (game) {
      txt += `📅 Prochain match : ${new Date(game.startDate).toLocaleDateString('fr-FR')}\n`;
      txt += `  ${game.awayTeam?.slug} @ ${game.homeTeam?.slug}\n`;
    }
    txt += `\n📦 Réponse brute :\n` + JSON.stringify(data.data, null, 2);

    result.className = 'result ok';
    result.textContent = txt;
  } catch(e) {
    result.className = 'result err';
    result.textContent = '❌ ' + e.message;
  }
}

async function testBatch() {
  const slugs = document.getElementById('batchInput').value
    .split('\n').map(s => s.trim()).filter(Boolean);
  const log   = document.getElementById('batchLog');
  const status= document.getElementById('batchStatus');

  log.className = 'result';
  log.textContent = '';
  let ok = 0, err = 0, total = slugs.length;

  for (let i = 0; i < slugs.length; i++) {
    const slug = slugs[i];
    status.textContent = `${i+1}/${total}...`;
    const t0 = Date.now();
    try {
      const data = await gql(`{ baseballPlayer(slug: "${slug}") {
        displayName
        nextClassicFixtureProjectedScore
        hitterAverageScore(type: LAST_FIFTEEN_PLAYED)
        pitcherAverageScore(type: LAST_FIFTEEN_PLAYED)
      }}`);
      const ms = Date.now() - t0;
      const p  = data?.data?.baseballPlayer;
      if (p) {
        const avg = p.hitterAverageScore ?? p.pitcherAverageScore;
        log.textContent += `✅ ${p.displayName.padEnd(25)} RW: ${(p.nextClassicFixtureProjectedScore ?? 0).toFixed(1).padStart(5)}  Avg15: ${(avg ?? 0).toFixed(1).padStart(5)}  (${ms}ms)\n`;
        ok++;
      } else {
        log.textContent += `⚠️ ${slug} — introuvable\n`;
        err++;
      }
    } catch(e) {
      log.textContent += `❌ ${slug} — ${e.message}\n`;
      err++;
    }
    // Pause 200ms pour respecter le rate limit
    await new Promise(r => setTimeout(r, 200));
  }
  status.textContent = `✅ ${ok} OK, ❌ ${err} erreurs`;
}

async function testRateLimit() {
  const result = document.getElementById('rateResult');
  const status = document.getElementById('rateStatus');
  result.className = 'result';
  result.textContent = '🚀 Envoi de 10 requêtes rapides...\n';

  const slug = 'jose-ramirez-19920917';
  const query = `{ baseballPlayer(slug: "${slug}") { displayName nextClassicFixtureProjectedScore } }`;
  const results = [];

  for (let i = 0; i < 10; i++) {
    const t0 = Date.now();
    try {
      const data = await gql(query);
      const ms = Date.now() - t0;
      const code = data.errors ? '429/err' : '200';
      results.push({ i: i+1, ms, code });
      result.textContent += `  Req ${i+1}: ${code} — ${ms}ms\n`;
    } catch(e) {
      results.push({ i: i+1, ms: 0, code: 'FAIL: ' + e.message });
      result.textContent += `  Req ${i+1}: FAIL — ${e.message}\n`;
    }
  }

  const avgMs = results.reduce((s, r) => s + r.ms, 0) / results.length;
  result.textContent += `\n⏱ Moyenne : ${avgMs.toFixed(0)}ms/req`;
  result.textContent += `\n📈 Débit estimé : ${(1000/avgMs).toFixed(1)} req/sec`;
  status.textContent = `Terminé — moy: ${avgMs.toFixed(0)}ms`;
  result.className = 'result ok';
}
</script>
</body>
</html>
