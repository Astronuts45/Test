<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧪 Test API Sorare</title>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#080a0f;--surface:#0c0f1a;--card:#111520;
  --border:#1a2035;--accent:#c9a84c;--green:#10b981;
  --red:#f43f5e;--text:#e8eaf0;--sub:#4a5568;--sub2:#718096;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Figtree',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:20px;}
h1{color:var(--accent);font-size:20px;margin-bottom:20px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:16px;}
.card h2{font-size:13px;color:var(--sub2);margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px;}
input,textarea,select{width:100%;padding:8px 12px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;margin-bottom:8px;}
textarea{resize:vertical;height:80px;font-family:monospace;}
button{padding:10px 16px;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;margin-right:6px;margin-bottom:6px;}
.btn-primary{background:var(--accent);color:#000;}
.btn-green{background:var(--green);color:#fff;}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text);}
.result{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px;margin-top:10px;font-size:12px;font-family:monospace;white-space:pre-wrap;min-height:40px;color:var(--sub2);max-height:300px;overflow-y:auto;}
.result.ok{border-color:var(--green);color:var(--green);}
.result.err{border-color:var(--red);color:var(--red);}
.result.info{border-color:var(--accent);color:var(--accent);}
</style>
</head>
<body>
<h1>🧪 Test API Sorare — MLB</h1>

<!-- 1. Joueur individuel -->
<div class="card">
  <h2>1. Joueur individuel</h2>
  <input type="text" id="slugInput" value="jose-ramirez-19920917" placeholder="slug (ex: jose-ramirez-19920917)">
  <div>
    <button class="btn-primary" onclick="testPlayer()">🔍 Tester</button>
    <button class="btn-ghost" onclick="setSlug('jose-ramirez-19920917')">Ramirez</button>
    <button class="btn-ghost" onclick="setSlug('shohei-ohtani-19940705')">Ohtani</button>
    <button class="btn-ghost" onclick="setSlug('david-bednar-19941002')">Bednar</button>
    <button class="btn-ghost" onclick="setSlug('tarik-skubal-19961120')">Skubal</button>
  </div>
  <div id="playerResult" class="result">En attente...</div>
</div>

<!-- 2. Batch -->
<div class="card">
  <h2>2. Batch — plusieurs slugs</h2>
  <textarea id="batchInput">kyle-schwarber-19930305
jose-ramirez-19920917
shohei-ohtani-19940705
tarik-skubal-19961120
david-bednar-19941002</textarea>
  <div>
    <button class="btn-green" onclick="testBatch()">⚡ Tester le batch</button>
    <span id="batchStatus" style="font-size:12px;color:var(--sub2)"></span>
  </div>
  <div id="batchLog" class="result">En attente...</div>
</div>

<!-- 3. Rate limit -->
<div class="card">
  <h2>3. Test vitesse & rate limit</h2>
  <p style="font-size:12px;color:var(--sub2);margin-bottom:10px">Envoie 10 requêtes consécutives et mesure le débit.</p>
  <button class="btn-ghost" onclick="testRateLimit()">🚀 Lancer</button>
  <span id="rateStatus" style="font-size:12px;color:var(--sub2)"></span>
  <div id="rateResult" class="result">En attente...</div>
</div>

<script>
const ENDPOINT = 'https://api.sorare.com/federation/graphql';

function setSlug(s) { document.getElementById('slugInput').value = s; }

// Essaye direct puis via proxy si CORS
async function gql(query) {
  const body = JSON.stringify({ query });
  const hdrs = { 'Content-Type': 'application/json', 'Accept': 'application/json' };

  // 1. Direct
  try {
    const r = await fetch(ENDPOINT, { method:'POST', headers:hdrs, body });
    if (r.ok) return await r.json();
  } catch(e) {}

  // 2. corsproxy.io
  try {
    const r = await fetch('https://corsproxy.io/?' + encodeURIComponent(ENDPOINT), { method:'POST', headers:hdrs, body });
    if (r.ok) return await r.json();
  } catch(e) {}

  // 3. allorigins GET
  const getUrl = ENDPOINT + '?query=' + encodeURIComponent(query);
  const r = await fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent(getUrl));
  if (r.ok) return await r.json();

  throw new Error('Tous les proxies ont échoué');
}

async function testPlayer() {
  const slug = document.getElementById('slugInput').value.trim();
  const el = document.getElementById('playerResult');
  el.className = 'result info'; el.textContent = '🔄 Requête en cours...';

  const query = `{
    baseballPlayer(slug: "${slug}") {
      displayName slug
      nextClassicFixtureProjectedScore
      nextDailyFixtureProjectedScore
      hitterAverageScore(type: LAST_FIFTEEN_PLAYED)
      hitterAverageScore(type: LAST_FIVE_PLAYED)
      pitcherAverageScore(type: LAST_FIFTEEN_PLAYED)
      pitcherAverageScore(type: LAST_FIVE_PLAYED)
      injuries { active description }
      nextGame { ... on GameOfBaseball {
        startDate
        homeTeam { slug }
        awayTeam { slug }
      }}
    }
  }`;

  try {
    const t0 = Date.now();
    const data = await gql(query);
    const ms = Date.now() - t0;

    if (data.errors) { el.className='result err'; el.textContent='❌ '+JSON.stringify(data.errors,null,2); return; }

    const p = data?.data?.baseballPlayer;
    if (!p) { el.className='result err'; el.textContent=`❌ Joueur introuvable : "${slug}"`; return; }

    const inj  = (p.injuries||[]).filter(i => i.active);
    const game = p.nextGame;
    let txt = `✅ ${p.displayName}  (${ms}ms)\n\n`;
    txt += `🎯 Projection RW :\n  Classic : ${p.nextClassicFixtureProjectedScore?.toFixed(1)??'N/A'}\n  Daily   : ${p.nextDailyFixtureProjectedScore?.toFixed(1)??'N/A'}\n\n`;
    txt += `📊 Scores moyens :\n  Avg 15 matchs (hitter)  : ${p.hitterAverageScore?.toFixed(1)??'N/A'}\n  Avg 5 matchs  (hitter)  : ${p.hitterAverageScore?.toFixed(1)??'N/A'}\n  Avg 15 matchs (pitcher) : ${p.pitcherAverageScore?.toFixed(1)??'N/A'}\n\n`;
    if (inj.length) txt += `🤕 Blessure : ${inj[0].description}\n\n`;
    if (game) txt += `📅 Prochain match : ${new Date(game.startDate).toLocaleDateString('fr-FR')}\n  ${game.awayTeam?.slug} @ ${game.homeTeam?.slug}\n\n`;
    txt += `📦 JSON brut :\n` + JSON.stringify(p, null, 2);
    el.className = 'result ok'; el.textContent = txt;
  } catch(e) {
    el.className = 'result err'; el.textContent = '❌ ' + e.message;
  }
}

async function testBatch() {
  const slugs = document.getElementById('batchInput').value.split('\n').map(s=>s.trim()).filter(Boolean);
  const log = document.getElementById('batchLog');
  const status = document.getElementById('batchStatus');
  log.className = 'result'; log.textContent = '';
  let ok = 0, err = 0;

  for (let i = 0; i < slugs.length; i++) {
    const slug = slugs[i];
    status.textContent = `${i+1}/${slugs.length}...`;
    const t0 = Date.now();
    try {
      const data = await gql(`{ baseballPlayer(slug: "${slug}") {
        displayName
        nextClassicFixtureProjectedScore
        hitterAverageScore(type: LAST_FIFTEEN_PLAYED)
        pitcherAverageScore(type: LAST_FIFTEEN_PLAYED)
      }}`);
      const ms = Date.now() - t0;
      const p = data?.data?.baseballPlayer;
      if (p) {
        const avg = p.hitterAverageScore ?? p.pitcherAverageScore ?? 0;
        log.textContent += `✅ ${p.displayName.padEnd(22)} RW: ${(p.nextClassicFixtureProjectedScore??0).toFixed(1).padStart(5)}  Avg15: ${avg.toFixed(1).padStart(5)}  (${ms}ms)\n`;
        ok++;
      } else {
        log.textContent += `⚠️ ${slug} — introuvable\n`; err++;
      }
    } catch(e) {
      log.textContent += `❌ ${slug} — ${e.message}\n`; err++;
    }
    await new Promise(r => setTimeout(r, 250));
  }
  status.textContent = `✅ ${ok} OK  ❌ ${err} erreurs`;
  log.className = ok > 0 ? 'result ok' : 'result err';
}

async function testRateLimit() {
  const result = document.getElementById('rateResult');
  const status = document.getElementById('rateStatus');
  result.className = 'result info'; result.textContent = '🚀 Envoi de 10 requêtes...\n';
  const q = `{ baseballPlayer(slug: "jose-ramirez-19920917") { displayName nextClassicFixtureProjectedScore } }`;
  const times = [];
  for (let i = 0; i < 10; i++) {
    const t0 = Date.now();
    try {
      const d = await gql(q);
      const ms = Date.now() - t0;
      times.push(ms);
      const code = d.errors ? 'ERR' : '200';
      result.textContent += `  Req ${i+1}: ${code}  ${ms}ms\n`;
    } catch(e) {
      result.textContent += `  Req ${i+1}: FAIL — ${e.message}\n`;
    }
  }
  if (times.length) {
    const avg = times.reduce((a,b)=>a+b,0)/times.length;
    result.textContent += `\n⏱ Moyenne : ${avg.toFixed(0)}ms/req\n📈 Débit : ${(1000/avg).toFixed(1)} req/sec`;
    result.className = 'result ok';
    status.textContent = `moy: ${avg.toFixed(0)}ms`;
  }
}
</script>
</body>
</html>
