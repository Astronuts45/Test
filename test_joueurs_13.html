function renderRosList() {
  const type      = document.getElementById('rosType').value;
  const data      = (rosData[type] || []);
  const search    = (document.getElementById('rosSearch')?.value || '').toLowerCase();
  const wrap      = document.getElementById('rosTableWrap');

  if (!data.length) {
    wrap.innerHTML = '<div class="empty-state"><div class="icon">📈</div><p>Cliquez sur <b>Charger Razzball</b> ou importez un CSV.</p></div>';
    document.getElementById('rosMatchCount').textContent = '';
    return;
  }

  const isHitter   = type === 'hitters';
  const isReliever = type === 'relievers';
  const calcType   = isReliever ? 'pitchers' : type;

  // Filtrer SP ou RP si on est dans Lanceurs
  let displayData = data;
  if (type === 'pitchers') {
    // Essayer de filtrer par position ESPN
    const filtered = data.filter(row => {
      const pos = (row.espn || row.pos || row.position || '').toUpperCase();
      if (rosPitcherSub === 'SP') return pos.includes('SP') || pos === 'P' || (!pos.includes('RP') && !pos.includes('CL') && !pos.includes('MR') && !pos.includes('SV'));
      if (rosPitcherSub === 'RP') return pos.includes('RP') || pos.includes('CL') || pos.includes('MR');
      return true;
    });
    // Si le filtre donne des résultats, on l'utilise
    if (filtered.length > 0) displayData = filtered;
  }

  // Colonnes stats fixes : B, Opps, #G + stats selon type
  const fixedCols  = ['b', 'opps', '#g'];
  const statsCols  = isHitter
    ? ['pa','h','2b','3b','hr','r','rbi','sb','cs','bb','so','hbp','avg','obp','slg']
    : ['gs','ip','w','sv','k','h','er','bb','hbp','era','whip'];
  const displayCols = [...fixedCols, ...statsCols];

  // Matching, PSo, filtres
  let matchedCount = 0;
  const rows = displayData.map(row => {
    const mp  = matchRosPlayer(row.name || row.player || '');
    const pso = calcPSo(row, calcType);
    if (mp) matchedCount++;
    return { ...row, _matched: mp, _pso: pso };
  }).filter(row => {
    const name = (row.name || row.player || '').toLowerCase();
    if (search && !name.includes(search)) return false;
    return true;
  }).sort((a, b) => b._pso - a._pso);

  // Pré-sélectionner le top 10 si aucune sélection manuelle n'existe
  if (rosSelected.size === 0) {
    rows.slice(0, 10).forEach(row => {
      const name = (row.name || row.player || '').toLowerCase();
      rosSelected.add(name);
    });
  }

  document.getElementById('rosMatchCount').textContent = `${rows.length} joueur(s) · ${rosSelected.size} sélectionné(s) dans le graphique`;

  const normStr   = s => s.toLowerCase().replace(/[\s\-_\/]/g,'');
  const sample    = displayData[0] || {};
  const available = displayCols.filter(c =>
    Object.keys(sample).some(k => normStr(k) === normStr(c))
  );
  const getVal = (row, col) => {
    for (const [k, v] of Object.entries(row)) {
      if (normStr(k) === normStr(col)) return v || '—';
    }
    return '—';
  };
  const colLabel = c => ({ 'b':'Bat','opps':'Adv','#g':'#G','pa':'PA','h':'H','2b':'2B','3b':'3B','hr':'HR','r':'R','rbi':'RBI','sb':'SB','cs':'CS','bb':'BB','so':'SO','hbp':'HBP','avg':'AVG','obp':'OBP','slg':'SLG','gs':'GS','ip':'IP','w':'W','sv':'SV','k':'K','er':'ER','era':'ERA','whip':'WHIP' }[c] || c.toUpperCase());

  // En-tête
  const thead = `<tr>
    <th style="width:32px;text-align:center" title="Cocher pour le graphique">☑</th>
    <th style="width:28px">#</th>
    <th>Joueur</th>
    <th>Pos</th>
    <th style="color:var(--accent)">PSo ⭐</th>
    <th>Équipe</th>
    ${available.map(c => `<th>${colLabel(c)}</th>`).join('')}
  </tr>`;

  const tbodyRows = rows.slice(0, 200).map((row, i) => {
    const name     = row.name || row.player || '—';
    const nameLow  = name.toLowerCase();
    const pos      = row.espn || row.pos || row.position || '—';
    const team     = row.team || '—';
    const pso      = row._pso;
    const psoStr   = pso !== 0 ? pso.toFixed(1) : '—';
    const isSel    = rosSelected.has(nameLow);
    const safeName = nameLow.replace(/\\/g,'\\\\').replace(/'/g,"\\'");

    const statTds = available.map(c => {
      const v = getVal(row, c);
      const isNum = !isNaN(parseFloat(v)) && v !== '—';
      return `<td class="${isNum ? 'ros-stat-col' : ''}">${v !== '' ? v : '—'}</td>`;
    }).join('');

    return `<tr class="ros-row" data-name="${nameLow.replace(/"/g,'&quot;')}"
        style="${isSel ? 'background:rgba(201,168,76,.13)' : ''}"
        onclick="toggleRosSelect('${safeName}')">
      <td style="text-align:center" onclick="event.stopPropagation();toggleRosSelect('${safeName}')">
        <input type="checkbox" class="ros-cb" ${isSel ? 'checked' : ''}
          style="cursor:pointer;accent-color:var(--accent)"
          onclick="event.stopPropagation();toggleRosSelect('${safeName}')">
      </td>
      <td style="color:var(--sub);font-size:11px">${i+1}</td>
      <td><b>${name}</b></td>
      <td>${posBadge(pos)}</td>
      <td><span class="score ${psoClass(pso)}" style="font-size:14px;font-weight:700">${psoStr}</span></td>
      <td style="color:var(--sub2);font-size:12px">${team}</td>
      ${statTds}
    </tr>`;
  }).join('');

  wrap.innerHTML = `
    <div class="ros-section-title" style="margin-bottom:8px;padding:0 4px">
      ${isHitter ? '⚾ Frappeurs' : type === 'pitchers' ? (rosPitcherSub === 'SP' ? '🥎 Lanceurs Partants (SP)' : '🔥 Releveurs (RP)') : '🥎 Lanceurs'} — ${rows.length} joueur(s) · triés par PSo
      <span style="font-size:11px;color:var(--sub);font-family:'DM Mono',monospace;margin-left:8px">
        ${isHitter
          ? 'R×3 + RBI×3 + 1B×2 + 2B×5 + 3B×8 + HR×10 + BB×2 + K×-1 + SB×5 + CS×-1 + HBP×2'
          : 'IP×3 + K×2 + H×-0.5 + ER×-2 + BB×-1 + HBP×-1 + W×5 + SV×10 + HLD×5'}
      </span>
    </div>
    <div class="ros-table-wrap">
      <table><thead>${thead}</thead><tbody>${tbodyRows}</tbody></table>
    </div>`;
}

function renderRosKpis(data) {
  const type    = document.getElementById('rosType').value;
  const roster  = data
    .filter(r => matchRosPlayer(r.name || r.player || '')?.inRoster)
    .map(r => ({ ...r, _pso: calcPSo(r, type) }));
  const kpisEl  = document.getElementById('rosKpis');
  if (!kpisEl) return;

  const sumOf = key => {
    const norm = s => s.toLowerCase().replace(/[\s\-_\/]/g,'');
    const vals = roster.map(r => {
      for (const [k,v] of Object.entries(r)) if (norm(k)===norm(key)) return parseFloat(v)||0;
      return 0;
    }).filter(v => v > 0);
    return vals.length ? Math.round(vals.reduce((a,b)=>a+b,0)) : '—';
  };
  const totalPso = roster.reduce((s,r) => s + (r._pso||0), 0);
  const avgPso   = roster.length ? (totalPso/roster.length).toFixed(1) : '—';
  const bestPso  = roster.length ? Math.max(...roster.map(r=>r._pso)).toFixed(1) : '—';

  const kpis = type === 'hitters'
    ? [
        { label: 'Effectif matchés (RoS)', val: roster.length },
        { label: 'PSo moyen effectif', val: avgPso },
        { label: 'Meilleur PSo', val: bestPso },
        { label: 'HR projetés', val: sumOf('hr') },
      ]
    : [
        { label: 'Effectif matchés (RoS)', val: roster.length },
        { label: 'PSo moyen effectif', val: avgPso },
        { label: 'Meilleur PSo', val: bestPso },
        { label: 'K projetés', val: sumOf('k') || sumOf('so') },
      ];

  kpisEl.innerHTML = kpis.map(k => `
    <div class="ros-kpi">
      <div class="ros-kpi-val">${k.val}</div>
      <div class="ros-kpi-label">${k.label}</div>
    </div>`).join('');
}

function renderRosChart() {
  const type   = document.getElementById('rosType').value;
  const data   = rosData[type] || [];
  const canvas = document.getElementById('rosChart');
  if (!canvas) return;
  if (rosChart) { rosChart.destroy(); rosChart = null; }

  const msgEl = canvas.parentElement.querySelector('.ros-chart-msg');

  if (!rosSelected.size) {
    canvas.style.display = 'none';
    if (!msgEl) {
      const m = document.createElement('div');
      m.className = 'ros-chart-msg';
      m.style.cssText = 'text-align:center;padding:50px 20px;color:var(--sub);font-size:13px;display:flex;align-items:center;justify-content:center;height:100%';
      m.innerHTML = '☑ Cochez des joueurs dans le tableau ci-dessous<br>pour les afficher dans ce graphique.';
      canvas.parentElement.appendChild(m);
    }
    return;
  }

  if (msgEl) msgEl.remove();
  canvas.style.display = '';

  const selRows = data
    .filter(r => rosSelected.has((r.name || r.player || '').toLowerCase()))
    .map(r => ({ ...r, _pso: calcPSo(r, type) }))
    .sort((a,b) => b._pso - a._pso);

  const labels = selRows.map(r => r.name || r.player || '?');
  const vals   = selRows.map(r => r._pso);
  const colors = vals.map(v => v >= 50 ? '#10b981' : v >= 25 ? '#c9a84c' : '#3b82f6');

  rosChart = new Chart(canvas, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: 'PSo Sorare projeté (RoS)',
        data: vals,
        backgroundColor: colors,
        borderRadius: 5,
        borderSkipped: false,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => ` PSo : ${ctx.parsed.y.toFixed(1)} pts` } }
      },
      scales: {
        x: { ticks: { color: '#718096', font: { size: 10 }, maxRotation: 35 }, grid: { color: '#1a2035' } },
        y: { ticks: { color: '#718096', font: { size: 10 } }, grid: { color: '#1a2035' } }
      }
    }
  });
}

function importPatreonFile(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const wb = XLSX.read(ev.target.result, { type: 'array' });

      let updated = 0, added = 0;

      // Col A=Slug, B=Name, C=Team, D=Pos, E=Hand, J(9)=Midweek, N(13)=Weekend
      function processSheet(sheetName, psoField) {
        const ws = wb.Sheets[sheetName];
        if (!ws) return;
        const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
        const headers = rows[0] || [];
        const midweekIdx = headers.indexOf('Midweek');
        const weekendIdx = headers.indexOf('Weekend');
        const psoIdx = psoField === 'midweek' ? (midweekIdx >= 0 ? midweekIdx : 9)
                                               : (weekendIdx >= 0 ? weekendIdx : 13);

        rows.slice(1).forEach(cols => {
          const slug = (cols[0] || '').toString().trim();
          const name = (cols[1] || '').toString().trim();
          const team = (cols[2] || '').toString().trim();
          const pos  = (cols[3] || '').toString().trim();
          const hand = (cols[4] || '').toString().trim();
          const pso  = parseFloat(cols[psoIdx]) || 0;
          if (!name || !slug) return;

          const ex = players.find(p => normalizeName(p.name) === normalizeName(name));
          if (ex) {
            if (psoField === 'midweek') ex.gwPsoLJ = pso;
            else                         ex.gwPsoVD = pso;
            ex.sorareSlug = slug;
            if (team) ex.team = team;
            if (pos && !ex.position) ex.position = pos;
            if (hand) ex.hand = hand;
            ex.updatedAt = new Date().toISOString();
            updated++;
          } else {
            const p = {
              id: Date.now() + Math.random(),
              name, team, position: pos, hand,
              sorareSlug: slug,
              gwPsoLJ: psoField === 'midweek' ? pso : 0,
              gwPsoVD: psoField === 'weekend' ? pso : 0,
              rarity: 'Limited', cards: [], inRoster: false,
              projection_score: 0, notes: '',
              updatedAt: new Date().toISOString(),
            };
            players.push(p);
            added++;
          }
        });
      }

      // L-J : Midweek
      processSheet('M-Th Hitters',  'midweek');
      processSheet('M-Th Pitchers', 'midweek');
      // V-D : Weekend
      processSheet('F-Su Hitters',  'weekend');
      processSheet('F-Su Pitchers', 'weekend');

      savePlayers(players);
      players = loadPlayers();

      const teamSel = document.getElementById('filterTeam');
      if (teamSel) {
        const teams = [...new Set(players.map(p => p.team).filter(Boolean))].sort();
        teamSel.innerHTML = '<option value="">Toutes</option>' +
          teams.map(t => `<option value="${t}">${t}</option>`).join('');
      }
      renderTable();
      toast(`✅ Patreon — ${updated} mis à jour, ${added} ajouté(s).`, 'success');
    } catch(err) {
      toast('Erreur : ' + err.message, 'error');
      console.error(err);
    }
    e.target.value = '';
  };
  reader.readAsArrayBuffer(file);
}

function applyPso(rows, psoField) {
  // Row 0 = headers, data à partir de row 1
  const headers    = rows[0].map(h => (h||'').toString().trim());
  const midweekIdx = headers.indexOf('Midweek');
  const weekendIdx = headers.indexOf('Weekend');
  const psoIdx     = psoField === 'midweek'
    ? (midweekIdx >= 0 ? midweekIdx : 9)
    : (weekendIdx >= 0 ? weekendIdx : 13);

  let updated = 0, added = 0;
  rows.slice(1).forEach(cols => {
    const slug = (cols[0]||'').toString().trim();
    const name = (cols[1]||'').toString().trim();
    const team = (cols[2]||'').toString().trim();
    const pos  = (cols[3]||'').toString().trim();
    const hand = (cols[4]||'').toString().trim();
    const pso  = parseFloat(cols[psoIdx]) || 0;
    if (!name) return;
    const ex = players.find(p => normalizeName(p.name) === normalizeName(name));
    if (ex) {
      if (psoField === 'midweek') ex.gwPsoLJ = pso; else ex.gwPsoVD = pso;
      if (slug) ex.sorareSlug = slug;
      if (team && !ex.team) ex.team = team;
      if (pos  && !ex.position) ex.position = pos;
      if (hand) ex.hand = hand;
      updated++;
    } else {
      players.push({
        id: Date.now() + Math.random(), name, team, position: pos, hand,
        sorareSlug: slug,
        gwPsoLJ: psoField === 'midweek' ? pso : 0,
        gwPsoVD: psoField === 'weekend' ? pso : 0,
        rarity: 'Limited', cards: [], inRoster: false,
        projection_score: 0, notes: '', updatedAt: new Date().toISOString(),
      });
      added++;
    }
  });
  return { updated, added };
}

function applyCeiling(rows, defaultPos) {
  // GWH/SP/RP : Row 0 = group header, Row 1 = col headers, data à partir de row 2
  // Col A(0)=Ceiling, Col D(3)=Player Name, Col E(4)=Pos (GWH), Col F(5)=Team (GWH)
  rows.slice(2).forEach(cols => {
    const ceiling = parseFloat(cols[0]);
    const name    = (cols[3]||'').toString().trim();
    if (!name || !ceiling) return;
    const ex = players.find(p => normalizeName(p.name) === normalizeName(name));
    if (ex) {
      ex.ceiling = ceiling;
      if (defaultPos && !ex.position) ex.position = defaultPos;
    }
  });
}

    setTimeout(() => { bar.style.display = 'none'; }, 6000);
  };

  sheetFetch(SHEETS.hitters_lj,  '⚾ Hitters L-J',  bar, (rows, err) => { if (!err) { const r = applyPso(rows, 'midweek'); totU += r.updated; totA += r.added; } done(); });
  sheetFetch(SHEETS.pitchers_lj, '🥎 Pitchers L-J', bar, (rows, err) => { if (!err) { const r = applyPso(rows, 'midweek'); totU += r.updated; totA += r.added; } done(); });
  sheetFetch(SHEETS.hitters_vd,  '⚾ Hitters V-D',  bar, (rows, err) => { if (!err) { const r = applyPso(rows, 'weekend'); totU += r.updated; totA += r.added; } done(); });
  sheetFetch(SHEETS.pitchers_vd, '🔥 Pitchers V-D', bar, (rows, err) => { if (!err) { const r = applyPso(rows, 'weekend'); totU += r.updated; totA += r.added; } done(); });
  sheetFetch(SHEETS.gwh,         '📊 Ceiling GWH',  bar, (rows, err) => { if (!err) applyCeiling(rows, null); done(); });
  sheetFetch(SHEETS.gwsp,        '📊 Ceiling SP',   bar, (rows, err) => { if (!err) applyCeiling(rows, 'SP'); done(); });
  sheetFetch(SHEETS.gwrp,        '📊 Ceiling RP',   bar, (rows, err) => { if (!err) applyCeiling(rows, 'RP'); done(); });
}
