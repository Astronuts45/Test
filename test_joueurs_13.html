// ══════════════════════════════════════════════════════
function renderCompareSelects() {
  const sorted = [...players].sort((a,b) => a.name.localeCompare(b.name));
  const opts   = sorted.map(p => `<option value="${p.id}">${p.name} (${p.team||'—'}) — ${p.position||'?'}</option>`).join('');
  document.getElementById('cmpP1').innerHTML = opts;
  document.getElementById('cmpP2').innerHTML = opts;
  if (sorted.length > 1) document.getElementById('cmpP2').selectedIndex = 1;
  renderCompare();
}

function renderCompare() {
  const id1 = parseFloat(document.getElementById('cmpP1').value);
  const id2 = parseFloat(document.getElementById('cmpP2').value);
  const p1  = players.find(p => p.id === id1);
  const p2  = players.find(p => p.id === id2);
  const body = document.getElementById('compareBody');

  if (!p1 || !p2 || id1 === id2) {
    body.innerHTML = '<div class="empty-state"><div class="icon">⚖️</div><p>Sélectionnez deux joueurs différents.</p></div>';
    return;
  }

  // Récupérer PSo GW
  const gwRaw = loadGWData();
  const norm  = s => (s||'').toLowerCase().replace(/[^a-z]/g,'');
  const getGWPso = p => {
    if (p.position === 'SP' && p.spPso != null) return p.spPso;
    if (p.gwPso != null) return p.gwPso;
    const raw = gwRaw.find(r => norm(r.name||r.player||'') === norm(p.name));
    return raw ? calcPSoGW(raw) : null;
  };

  // Récupérer PSo RoS
  const rosAll = loadRosData();
  const rosPsoMap = new Map();
  const fillR = (data, type) => data.forEach(r => {
    const n = normalizeName(r.name || r.player || '');
    if (n && !rosPsoMap.has(n)) rosPsoMap.set(n, calcPSo(r, type));
  });
  fillR(rosAll.hitters   || [], 'hitters');
  fillR(rosAll.pitchers  || [], 'pitchers');
  fillR(rosAll.relievers || [], 'pitchers');

  const psoGW1  = getGWPso(p1);
  const psoGW2  = getGWPso(p2);
  const ceil1   = parseFloat(p1.ceiling) || null;
  const ceil2   = parseFloat(p2.ceiling) || null;
  const rosPso1 = rosPsoMap.get(normalizeName(p1.name)) ?? null;
  const rosPso2 = rosPsoMap.get(normalizeName(p2.name)) ?? null;
  const gwInfo1 = getGWInfo(p1.name);
  const gwInfo2 = getGWInfo(p2.name);

  const isPitcher1 = ['SP','RP'].includes(p1.position);
  const isPitcher2 = ['SP','RP'].includes(p2.position);

  // Construire les lignes
  const fmt2 = v => v != null ? v.toFixed(1) : '—';
  let wins1 = 0, wins2 = 0;

  const makeRow = (label, v1, v2, higherIsBetter = true) => {
    const n1 = parseFloat(v1), n2 = parseFloat(v2);
    const hasNum = !isNaN(n1) && !isNaN(n2);
    const w1 = hasNum && (higherIsBetter ? n1 > n2 : n1 < n2);
    const w2 = hasNum && (higherIsBetter ? n2 > n1 : n2 < n1);
    if (w1) wins1++;
    if (w2) wins2++;
    const bar = hasNum ? (() => {
      const total = Math.abs(n1) + Math.abs(n2) || 1;
      const pct1  = Math.round((Math.abs(n1) / total) * 100);
      const pct2  = 100 - pct1;
      return `<div style="display:flex;height:3px;border-radius:2px;overflow:hidden;margin-top:6px">
        <div style="width:${pct1}%;background:${w1?'#10b981':w2?'var(--border)':'var(--sub)'}"></div>
        <div style="width:${pct2}%;background:${w2?'#f97316':w1?'var(--border)':'var(--sub)'}"></div>
      </div>`;
    })() : '';
    return `
      <div class="cmp-row">
        <div class="cmp-label">${label}</div>
        <div class="cmp-val${w1?' winner':''}">${typeof v1 === 'number' ? fmt2(v1) : (v1||'—')}</div>
        <div class="cmp-val${w2?' winner':''}">${typeof v2 === 'number' ? fmt2(v2) : (v2||'—')}</div>
        <div class="cmp-winner-label">${w1?'◀':w2?'▶':'='}</div>
      </div>${bar ? `<div style="padding:0 12px 8px">${bar}</div>` : ''}`;
  };

  let rows = '';
  rows += makeRow('PSo GW',   psoGW1,  psoGW2);
  rows += makeRow('Ceiling',  ceil1,   ceil2);
  rows += makeRow('PSo RoS',  rosPso1, rosPso2);
  rows += makeRow('Adversaire', gwInfo1.opps || (p1.spOpp||'—'), gwInfo2.opps || (p2.spOpp||'—'), false);
  if (!isPitcher1 || !isPitcher2) {
    rows += makeRow('#G', parseFloat(gwInfo1.g)||null, parseFloat(gwInfo2.g)||null);
  }
  if (!isPitcher1 && !isPitcher2) {
    rows += makeRow('Bat', gwInfo1.b||'—', gwInfo2.b||'—', false);
  }
  if (isPitcher1 || isPitcher2) {
    rows += makeRow('Date', p1.spDate||'—', p2.spDate||'—', false);
  }

  const overall = wins1 > wins2 ? p1.name : wins2 > wins1 ? p2.name : 'Égalité';

  body.innerHTML = `
    <div class="cmp-header">
      <div style="background:transparent"></div>
      <div style="color:var(--accent)">${p1.name}<br><small style="font-size:11px;color:var(--sub)">${p1.team||''} · ${p1.position||''}</small></div>
      <div style="color:#f97316">${p2.name}<br><small style="font-size:11px;color:var(--sub)">${p2.team||''} · ${p2.position||''}</small></div>
      <div style="background:transparent"></div>
    </div>
    ${rows}
    <div class="cmp-summary">
      <div style="font-size:12px;color:var(--sub);margin-bottom:6px">Meilleur globalement</div>
      <div class="cmp-summary-title">🏆 ${overall}</div>
      <div style="font-size:12px;color:var(--sub);margin-top:4px">${wins1} vs ${wins2} critères gagnés</div>
    </div>
  `;
}

}

// ── Meilleures Équipes — état ──
let bestState    = null;
let bestPriority = 'gw'; // 'gw' ou 'ceiling'

function setBestPriority(p) {
  bestPriority = p;
  document.getElementById('bestPrioGW').classList.toggle('active', p === 'gw');
  document.getElementById('bestPrioCeil').classList.toggle('active', p === 'ceiling');
}

function runBestOptimize() {
  const gwRaw = loadGWData();
  const norm  = s => (s||'').toLowerCase().replace(/[^a-z]/g,'');

  const getGWPso = p => {
    if (p.position === 'SP' && p.spPso != null) return p.spPso;
    if (p.gwPso != null) return p.gwPso;
    const raw = gwRaw.find(r => norm(r.name||r.player||'') === norm(p.name));
    return raw ? calcPSoGW(raw) : 0;
  };
  const getCeil  = p => parseFloat(p.ceiling) || 0;
  const getScore = p => {
    if (p.position === 'RP') return getCeil(p); // RP → toujours Ceiling
    return bestPriority === 'ceiling' ? getCeil(p) : getGWPso(p);
  };

  const eligible = players
    .filter(p => p.position)
    .map(p => ({ ...p, _score: getScore(p), _psoGW: getGWPso(p), _ceiling: getCeil(p) }))
    .filter(p => p._score > 0)
    .sort((a, b) => b._score - a._score);

  // Fonction de remplissage des slots
  const fillSlots = (excluded = new Set()) => {
    const used  = new Set();
    const slots = OPT_SLOTS.map(slot => {
      const best = eligible.find(p =>
        slot.positions.includes(p.position) && !used.has(p.id) && !excluded.has(p.id)
      );
      if (best) { used.add(best.id); return { slot: slot.name, player: best }; }
      return { slot: slot.name, player: null };
    });
    return slots;
  };

  // Générer la meilleure équipe de base
  const proposals = [];
  const base = fillSlots();
  proposals.push(base);

  // Générer 9 variantes en excluant chaque joueur de la base
  const baseIds = base.map(a => a.player?.id).filter(Boolean);
  for (let skip = 0; skip < baseIds.length && proposals.length < 10; skip++) {
    for (let skip2 = skip; skip2 < baseIds.length && proposals.length < 10; skip2++) {
      const excluded = new Set([baseIds[skip], skip2 !== skip ? baseIds[skip2] : null].filter(Boolean));
      const prop = fillSlots(excluded);
      const propIds = new Set(prop.map(a => a.player?.id).filter(Boolean));
      const isUnique = proposals.every(existing => {
        const existIds = new Set(existing.map(a => a.player?.id).filter(Boolean));
        return [...propIds].some(id => !existIds.has(id));
      });
      if (isUnique) proposals.push(prop);
    }
  }

  // Trier par score total décroissant
  proposals.sort((a, b) =>
    b.reduce((s, x) => s + (x.player?._score || 0), 0) -
    a.reduce((s, x) => s + (x.player?._score || 0), 0)
  );

  bestState = { slots: proposals[0], proposals, selectedProposal: 0 };
  renderBestOptimize();
  toast(`✅ Meilleures Équipes — ${proposals.length} proposition(s) générées.`, 'success');
}

function renderBestOptimize() {
  const selectedWrap  = document.getElementById('optSelectedWrap');
  const proposalsWrap = document.getElementById('optProposalsWrap');

  if (!bestState) {
    selectedWrap.innerHTML = `
      <div class="empty-state" style="padding:28px 20px">
        <div class="icon" style="color:#10b981">⭐</div>
        <p><b style="color:#10b981">Meilleures Équipes</b><br>
        Choisissez votre priorité puis cliquez sur "⚡ Générer".</p>
      </div>`;
    proposalsWrap.innerHTML = '';
    return;
  }

  const { slots, proposals, selectedProposal } = bestState;
  const filled    = slots.filter(a => a.player).length;
  const total     = slots.reduce((s, a) => s + (a.player?._score || 0), 0);
  const prioLabel = bestPriority === 'ceiling' ? 'Ceiling' : 'PSo GW';

  const slotCards = slots.map((a, si) => {
    const card = makeSorareCard(a, si, null, null, null);
    const p = a.player;
    const dateStr = p ? (p.spDate || p.opps || '') : '';
    const gCount  = p ? Math.min(parseInt(p?.g)||0, 4) : 0;
    const gLabel  = gCount > 0 ? `${gCount} match${gCount > 1 ? 's' : ''}` : '';

    return `<div class="sorare-team-slot">
      ${card}
      ${dateStr ? `<div class="sorare-slot-date">${dateStr}</div>` : '<div class="sorare-slot-date" style="opacity:0">—</div>'}
      ${gLabel ? `<div style="font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;color:var(--accent);text-align:center;letter-spacing:.3px">${gLabel}</div>` : ''}
    </div>`;
  }).join('');

  selectedWrap.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <div style="font-weight:700;color:#10b981;font-size:14px">⭐ Meilleures Équipes · priorité ${prioLabel}</div>
      <div style="display:flex;align-items:center;gap:12px">
        <span style="font-size:12px;color:var(--sub)">${filled}/7 slots</span>
        <span style="font-family:'DM Mono',monospace;font-size:16px;font-weight:700;color:#10b981">${total.toFixed(1)} pts</span>
      </div>
    </div>
    <div class="sorare-team-grid">${slotCards}</div>`;

  // ── Propositions ──
  if (!proposals?.length) { proposalsWrap.innerHTML = ''; return; }

  proposalsWrap.innerHTML = `<div style="font-size:12px;font-weight:700;color:var(--sub2);margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px">${proposals.length} Proposition(s)</div>`;

  proposals.forEach((prop, pi) => {
    const propTotal = prop.reduce((s, a) => s + (a.player?._score || 0), 0);
    const isSelected = pi === selectedProposal;
    const names = prop.filter(a => a.player).map(a =>
      `<span style="font-size:11px;color:var(--sub2)">${a.slot}: <b style="color:var(--text)">${a.player.name}</b></span>`
    ).join(' · ');
    const div = document.createElement('div');
    div.className = 'proposal-card' + (isSelected ? ' selected' : '');
    div.style.cssText = isSelected ? 'border-color:#10b981;background:rgba(16,185,129,.06)' : '';
    div.innerHTML = `
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
        <span style="font-size:12px;font-weight:700;color:${isSelected?'#10b981':'var(--sub2)'}">Proposition ${pi+1}</span>
        <span style="font-family:'DM Mono',monospace;font-weight:700;color:#10b981">${propTotal.toFixed(1)} pts</span>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:4px">${names}</div>`;
    div.onclick = () => {
      bestState.slots = prop;
      bestState.selectedProposal = pi;
      renderBestOptimize();
    };
    proposalsWrap.appendChild(div);
  });
}

function makeSorareCard(a, si, stateRef, onLock, onExclude) {
  if (!a.player) {
    return `<div class="sorare-card empty" style="width:110px;height:160px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px">
      <div style="font-size:22px;opacity:.3">+</div>
      <div style="font-size:9px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.5px">${a.slot}</div>
    </div>`;
  }

  const p        = a.player;
  const rarity   = (p.rarity || (document.querySelector('#tab-optimize .opt-nav-rarity.active')?.dataset.rarity) || 'limited').toLowerCase();
  const isLocked = stateRef?.locked?.has(si) || false;
  const isInjured = !!(p.inj_type);
  const initials = p.name.split(/\s+/).map(w => w[0]).join('').slice(0,3).toUpperCase();
  const psoGW    = p.spPso != null ? p.spPso : (p.gwPso != null ? p.gwPso : null);
  const ceil     = parseFloat(p.ceiling) || null;
  const psoColor = psoGW != null ? rankColor(null, null, psoGW) : 'rgba(255,255,255,.7)';
  const ceilColor= ceil  != null ? rankColor(null, null, ceil)  : 'rgba(255,255,255,.7)';

  const lockBtn    = onLock    ? `<button onclick="event.stopPropagation();${onLock}" title="${isLocked?'Déverrouiller':'Verrouiller'}">${isLocked?'🔒':'🔓'}</button>` : '';
  const excludeBtn = onExclude ? `<button onclick="event.stopPropagation();${onExclude}" title="Exclure" style="color:#f43f5e">✕</button>` : '';

  const cardClass = `sorare-card ${rarity}${isLocked?' locked':''}`;

  const psoGWRankEntry = window._psoGWRankMap?.get(normalizeName(p.name));
  const rankBadge = psoGWRankEntry
    ? `<div style="position:absolute;top:5px;right:6px;font-size:9px;font-weight:800;color:rgba(255,255,255,.85);background:rgba(0,0,0,.45);border-radius:4px;padding:1px 4px;letter-spacing:.2px;z-index:3">#${psoGWRankEntry.rank}</div>`
    : '';

  return `<div class="${cardClass}">
    <div class="sorare-card-slot">${a.slot}</div>
    ${rankBadge}
    ${isInjured ? `<div style="position:absolute;top:22px;left:7px;font-size:11px;z-index:2" title="${p.inj_type}">🤕</div>` : ''}
    <div class="sorare-card-actions">${lockBtn}${excludeBtn}</div>
    <div class="sorare-card-initials">${initials}</div>
    <div class="sorare-card-pos-team">${p.position||'?'} · ${p.team||'?'}</div>
    <div class="sorare-card-footer">
      <div class="sorare-card-stats-labels"><span>PSo GW</span><span>Ceiling</span></div>
      <div class="sorare-card-stats-values">
        <span style="color:${psoColor}">${psoGW != null ? psoGW.toFixed(1) : '—'}</span>
        <span style="color:${ceilColor}">${ceil != null ? ceil.toFixed(1) : '—'}</span>
      </div>
      <div class="sorare-card-name">${p.name}${isInjured?' 🤕':''}</div>
      ${(p.cards||[]).some(c=>c.type==='inseason') ? `<div style="font-size:8px;font-weight:700;color:#60a5fa;text-align:center;letter-spacing:.3px;opacity:.9;padding-bottom:2px">IN SEASON</div>` : ''}
    </div>
  </div>`;
}

function runOptimize() {
  if (optComp === 'best') { runBestOptimize(); return; }
  const rarities = getRarities();
  if (!rarities.length) { toast('Sélectionnez au moins une rareté.', 'error'); return; }

  const rosMap  = buildRosMap();
  const gwRaw2  = loadGWData();
  const normN2  = s => (s||'').toLowerCase().replace(/[^a-z]/g,'');

  const getCompScore = p => {
    if (p.position === 'RP') return parseFloat(p.ceiling) || 0; // RP → toujours Ceiling
    if (bestPriority === 'ceiling') return parseFloat(p.ceiling) || 0;
    if (p.position === 'SP' && p.spPso != null) return p.spPso;
    if (p.gwPso != null) return p.gwPso;
    const raw = gwRaw2.find(r => normN2(r.name||r.player||'') === normN2(p.name));
    return raw ? calcPSoGW(raw) : (rosMap.get(p.name) ?? (parseFloat(p.projection_score)||0));
  };

  const rarity = rarities[0];
  const needsInSeason = (optComp === 'hotstreak' || optComp === 'champions');

  // Joueurs déjà utilisés dans les AUTRES équipes (par player ID)
  const usedElsewhere = new Set();
  ['challenger','hotstreak','champions'].forEach(comp => {
    [0,1,2,3].forEach(ti => {
      if (comp === optComp && ti === optTeam) return;
      const team = optState[comp][ti];
      if (!team || !team.validated) return; // seulement les équipes validées
      team.slots.forEach(a => { if (a?.player) usedElsewhere.add(a.player.id); });
    });
  });

  // Récupérer les slots verrouillés et les joueurs exclus
  const prevState    = optState[optComp][optTeam];
  const locked       = prevState?.locked   || new Set();
  const excludedSet  = prevState?.excluded || new Set();
  const lockedSlots = new Map(); // slotIdx → player
  if (prevState?.slots) {
    prevState.slots.forEach((a, si) => {
      if (locked.has(si) && a.player) lockedSlots.set(si, a.player);
    });
  }

  // Exclure les joueurs verrouillés des éligibles (ils seront réinsérés après)
  const lockedIds = new Set([...lockedSlots.values()].map(p => p.id));

  const eligibleIS  = [];
  const eligibleAny = [];

  players.filter(p => p.inRoster && !usedElsewhere.has(p.id) && !lockedIds.has(p.id) && !excludedSet.has(p.id)).forEach(p => {
    const cards = (p.cards || []).filter(c => c && c.rarity === rarity);
    if (!cards.length) return;
    const hasIS      = cards.some(c => c.type === 'inseason');
    const hasClassic = cards.some(c => c.type === 'classic');
    const score      = getCompScore(p);
    const entry      = { ...p, _score: score, _cardType: hasIS ? 'inseason' : 'classic' };
    if (hasIS)                eligibleIS.push(entry);
    if (hasIS || hasClassic)  eligibleAny.push(entry);
  });

  eligibleIS.sort( (a,b) => b._score - a._score);
  eligibleAny.sort((a,b) => b._score - a._score);

  const proposals = [];
  const bestBase = fillSlotsTyped(eligibleIS, eligibleAny, needsInSeason, new Set(), lockedSlots);
  if (bestBase) proposals.push(bestBase);

  const baseIds = bestBase ? bestBase.map(a => a.player?.id).filter(Boolean) : [];
  for (let skip = 0; skip < baseIds.length && proposals.length < 10; skip++) {
    for (let skip2 = skip; skip2 < baseIds.length && proposals.length < 10; skip2++) {
      if (lockedIds.has(baseIds[skip]) || lockedIds.has(baseIds[skip2])) continue;
      const excluded = new Set([baseIds[skip], skip2 !== skip ? baseIds[skip2] : null].filter(Boolean));
      const prop = fillSlotsTyped(eligibleIS, eligibleAny, needsInSeason, excluded, lockedSlots);
      if (!prop) continue;
      const propIds = new Set(prop.map(a => a.player?.id).filter(Boolean));
      const isUnique = proposals.every(existing => {
        const existIds = new Set(existing.map(a => a.player?.id).filter(Boolean));
        return [...propIds].some(id => !existIds.has(id));
      });
      if (isUnique) proposals.push(prop);
    }
  }

  proposals.sort((a,b) =>
    b.reduce((s,x) => s+(x.player?._score||0), 0) -
    a.reduce((s,x) => s+(x.player?._score||0), 0)
  );

  optState[optComp][optTeam] = {
    slots: proposals[0] || OPT_SLOTS.map(s => ({ slot: s.name, player: null })),
    proposals,
    selectedProposal: 0,
    locked,
    excluded: excludedSet,
  };

  refreshTeamNav();
  renderOptimize();
  const comp = COMP_DEFS.find(c => c.key === optComp);
  toast(`✅ ${comp.label} · Équipe ${optTeam+1} — ${proposals.length} proposition(s) !`, 'success');
}

function fillSlotsTyped(eligibleIS, eligibleAny, needsInSeason, excluded, lockedSlots = new Map()) {
  const byPriority = [...OPT_SLOTS].sort((a,b) => a.positions.length - b.positions.length);
  const lockedIds  = new Set([...lockedSlots.values()].map(p => p.id));
  const excl       = new Set([...excluded, ...lockedIds]);

  if (!needsInSeason) {
    const result  = new Map();
    const usedIds = new Set([...excl]);
    byPriority.forEach(slot => {
      const si = OPT_SLOTS.findIndex(s => s.name === slot.name);
      if (lockedSlots.has(si)) { result.set(slot.name, lockedSlots.get(si)); return; }
      const best = eligibleAny.find(p => !usedIds.has(p.id) && slot.positions.includes(p.position));
      if (best) { usedIds.add(best.id); result.set(slot.name, best); }
      else result.set(slot.name, null);
    });
    return OPT_SLOTS.map(s => ({ slot: s.name, player: result.get(s.name) || null }));
  }

  let bestAssignment = null;
  let bestScore = -1;
  for (const targetIS of [6, 7]) {
    const attempt = tryFillWithISCount(eligibleIS, eligibleAny, byPriority, excl, targetIS, lockedSlots);
    if (!attempt) continue;
    const score = attempt.reduce((s,a) => s+(a.player?._score||0), 0);
    if (score > bestScore) { bestScore = score; bestAssignment = attempt; }
  }
  return bestAssignment || OPT_SLOTS.map(s => ({ slot: s.name, player: null }));
}

function tryFillWithISCount(eligibleIS, eligibleAny, byPriority, excluded, targetIS, lockedSlots = new Map()) {
  const usedIds = new Set([...excluded]);
  const result  = new Map();
  let isAssigned = 0;

  // Injecter les slots verrouillés
  byPriority.forEach(slot => {
    const si = OPT_SLOTS.findIndex(s => s.name === slot.name);
    if (lockedSlots.has(si)) {
      const lp = lockedSlots.get(si);
      result.set(slot.name, lp);
      usedIds.add(lp.id);
      if (lp._cardType === 'inseason') isAssigned++;
    }
  });

  // Passe 1 : IS
  byPriority.forEach(slot => {
    if (result.has(slot.name) || isAssigned >= targetIS) return;
    const best = eligibleIS.find(p => !usedIds.has(p.id) && slot.positions.includes(p.position));
    if (best) { usedIds.add(best.id); result.set(slot.name, best); isAssigned++; }
  });

  if (isAssigned < targetIS) return null;

  // Passe 2 : Any
  byPriority.forEach(slot => {
    if (result.has(slot.name)) return;
    const best = eligibleAny.find(p => !usedIds.has(p.id) && slot.positions.includes(p.position));
    if (best) { usedIds.add(best.id); result.set(slot.name, best); }
    else result.set(slot.name, null);
  });

  return OPT_SLOTS.map(s => ({ slot: s.name, player: result.get(s.name) || null }));
}

function toggleLockSlot(slotIdx) {
  const state = optState[optComp]?.[optTeam];
  if (!state) return;
  if (!state.locked) state.locked = new Set();
  if (state.locked.has(slotIdx)) state.locked.delete(slotIdx);
  else state.locked.add(slotIdx);
  renderOptimize();
}

function excludePlayer(playerId, name) {
  const state = optState[optComp]?.[optTeam];
  if (!state) return;
  if (!state.excluded) state.excluded = new Set();
  state.excluded.add(playerId);
  toast(`${name} exclu — relancez l'optimisation.`, 'info');
  renderOptimize();
}

function unexcludePlayer(playerId) {
  const state = optState[optComp]?.[optTeam];
  if (!state?.excluded) return;
  state.excluded.delete(playerId);
  const p = players.find(x => x.id === playerId);
  toast(`${p?.name || 'Joueur'} réintégré.`, 'info');
  renderOptimize();
}

  rarities.forEach(r => {
    allComps.forEach(comp => {
      Array.from({length: comp.teams}, (_,i) => optAllStates[r]?.[comp.key]?.[i]).forEach(t => {
        t?.slots?.forEach(a => { if (a.player) uniqueIds.add(a.player.id); });

    allComps.some(c =>

    let compTotal = 0;
    const teamRows = Array.from({length: comp.teams}, (_,i) => {

      rarities.forEach(r => {
        const state = optAllStates[r]?.[comp.key]?.[i];
        score  += state?.slots?.reduce((t,a) => t+(a.player?._score||0), 0) || 0;

      <div class="dash-comp-header">
        <span class="dash-comp-title" style="color:${comp.color}">${comp.icon} ${comp.label}</span>

      </div>
      ${teamRows}

    <div style="grid-column:span 3;background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.2);border-radius:10px;padding:12px 16px;display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:13px;color:var(--sub2)">PSo total · <b style="color:var(--accent)">${uniqueIds.size}</b> joueurs uniques</span>
      <span style="font-family:'DM Mono',monospace;font-size:17px;font-weight:700;color:var(--accent)">${grandTotal.toFixed(1)} pts</span>

}

function renderOptimize() {
  if (optComp === 'best') { renderBestOptimize(); return; }
  refreshTeamNav();
  const selectedWrap   = document.getElementById('optSelectedWrap');
  const proposalsWrap  = document.getElementById('optProposalsWrap');
  const state = optState[optComp]?.[optTeam];
  const comp  = COMP_DEFS.find(c => c.key === optComp);

  if (!state) {
    selectedWrap.innerHTML = `
      <div class="empty-state" style="padding:28px 20px">
        <div class="icon" style="color:${comp.color}">${comp.icon}</div>
        <p><b style="color:${comp.color}">${comp.label} — Équipe ${optTeam+1}</b><br>
        Cliquez sur "⚡ Générer les propositions".</p>
      </div>`;
    proposalsWrap.innerHTML = '';
    return;
  }

  const { slots, proposals, selectedProposal } = state;

  // ── Équipe sélectionnée en haut ──
  const total  = slots.reduce((s,a) => s+(a.player?._score||0), 0);
  const filled = slots.filter(a=>a.player).length;

  const slotCards = slots.map((a, si) => {
    const onLock    = `toggleLockSlot(${si})`;
    const onExclude = a.player ? `excludePlayer(${a.player.id},'${(a.player.name||'').replace(/'/g,"\\'")}')` : null;
    const card = makeSorareCard(a, si, state, onLock, onExclude);

    // Date du joueur (SP → spDate, Frappeurs → spDate vide → Adv)
    const p = a.player;
    const dateStr = p ? (p.spDate || p.opps || '') : '';

    // Nombre de matchs en texte
    const gCount  = p ? Math.min(parseInt(p.g) || 0, 4) : 0;
    const gLabel  = gCount > 0 ? `${gCount} match${gCount > 1 ? 's' : ''}` : '';

    return `<div class="sorare-team-slot">
      ${card}
      ${dateStr ? `<div class="sorare-slot-date">${dateStr}</div>` : '<div class="sorare-slot-date" style="opacity:0">—</div>'}
      ${gLabel ? `<div style="font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;color:var(--accent);text-align:center;letter-spacing:.3px">${gLabel}</div>` : ''}
    </div>`;
  }).join('');

  const needsIS = (optComp === 'hotstreak' || optComp === 'champions');
  const constraintLabel = needsIS ? ' · <span style="font-size:11px;color:#60a5fa">6 In Season + 1 Flex</span>' : '';

  const excludedIds = state.excluded || new Set();
  const excludedNames = [...excludedIds].map(id => {
    const p = players.find(x => x.id === id);
    return p ? `<span style="background:rgba(244,63,94,.1);color:var(--red);border:1px solid rgba(244,63,94,.3);border-radius:5px;padding:1px 7px;font-size:11px;cursor:pointer" onclick="unexcludePlayer(${id})" title="Cliquer pour réintégrer">✕ ${p.name}</span>` : '';
  }).filter(Boolean).join(' ');

  selectedWrap.innerHTML = `
    <div class="selected-team-banner">
      <span style="color:${comp.color};font-weight:700;font-size:13px">${comp.icon} ${comp.label} · Équipe ${optTeam+1}${constraintLabel}</span>
      <span style="font-family:'DM Mono',monospace;font-size:14px;color:var(--accent);margin-left:8px">${total.toFixed(1)} pts</span>
      <span style="font-size:11px;color:var(--sub);margin-left:4px">${filled}/7 slots · Proposition #${(selectedProposal||0)+1}</span>
      ${excludedNames ? `<div style="margin-left:12px;display:flex;gap:4px;align-items:center;flex-wrap:wrap"><span style="font-size:11px;color:var(--sub)">Exclus :</span>${excludedNames}</div>` : ''}
      <button class="btn btn-primary" style="margin-left:auto;padding:5px 14px;font-size:12px" onclick="validateTeam()">✅ Valider l'équipe</button>
    </div>
    <div class="sorare-team-grid">${slotCards}</div>`;

  // ── 10 propositions en bas ──
  if (!proposals || !proposals.length) { proposalsWrap.innerHTML = ''; return; }

  const bestKeys = new Set(proposals[0]?.map(a=>a.player?.id).filter(Boolean) || []);

  proposalsWrap.innerHTML = '';
  const header = document.createElement('div');
  header.style.cssText = 'font-size:12px;color:var(--sub);margin-bottom:12px;font-weight:600';
  header.textContent = `${proposals.length} proposition(s) — cliquez pour sélectionner`;
  proposalsWrap.appendChild(header);

  proposals.forEach((prop, pi) => {
    const ptotal  = prop.reduce((s,a) => s+(a.player?._score||0), 0);
    const isSel   = pi === (selectedProposal||0);
    const propIds = new Set(prop.map(a=>a.player?.id).filter(Boolean));
    const diffCount = pi > 0 ? [...propIds].filter(id => !bestKeys.has(id)).length : 0;

    const card = document.createElement('div');
    card.className = 'proposal-card' + (isSel ? ' selected' : '');
    card.style.cssText = isSel ? 'border-color:var(--accent)' : '';

    // Header de la proposition
    const rankColor_ = pi===0 ? '#c9a84c' : pi===1 ? '#94a3b8' : pi===2 ? '#cd7f32' : 'var(--sub2)';
    const badge = pi===0 ? '⭐ Meilleure' : diffCount > 0 ? `${diffCount} diff.` : '';

    // Mini cartes Sorare pour la proposition
    const selectedRarity = (getRarities()[0] || 'Limited').toLowerCase();
    const miniCards = prop.map(a => {

// ── Slot Picker ──
let _pickerComp = null, _pickerTeam = null, _pickerSlot = null;

function openSlotPicker(compKey, teamIdx, slotIdx) {
  _pickerComp = compKey; _pickerTeam = teamIdx; _pickerSlot = slotIdx;
  const slot     = OPT_SLOTS[slotIdx];
  const rarities = getRarities();
  const rosMap   = buildRosMap();

  const usedIds = new Set();
  ['challenger','hotstreak','champions'].forEach(comp => {
    [0,1,2].forEach(ti => {
      const st = optState[comp][ti];
      if (!st) return;
      st.slots.forEach((a, si) => {
        if (a?.player && !(comp===compKey && ti===teamIdx && si===slotIdx))
          usedIds.add(a.player.id);
      });
    });
  });

  const eligible = players
    .filter(p => p.inRoster && rarities.includes(p.rarity) && slot.positions.includes(p.position) && !usedIds.has(p.id))
    .map(p => ({ ...p, _score: rosMap.get(p.name) ?? (parseFloat(p.projection_score)||0) }))
    .sort((a,b) => b._score - a._score);

  const comp = COMP_DEFS.find(c => c.key === compKey);
  document.getElementById('slotPickerTitle').textContent =
    `${comp.icon} ${comp.label} · Équipe ${teamIdx+1} — Slot ${slot.name} (${POS_DESC[slot.name]})`;

  const list = document.getElementById('slotPickerList');
  list.innerHTML = !eligible.length
    ? '<div style="padding:20px;text-align:center;color:var(--sub)">Aucun joueur disponible.</div>'
    : eligible.map(p => `
      <div onclick="assignSlot(${p.id})"
        style="display:flex;align-items:center;gap:12px;padding:10px 16px;cursor:pointer;border-bottom:1px solid var(--border)"
        onmouseover="this.style.background='var(--card)'" onmouseout="this.style.background=''">
        <div style="flex:1">
          <div style="font-weight:600;font-size:13px">${p.name}</div>
          <div style="font-size:11px;color:var(--sub)">${p.team||''} · ${posBadge(p.position)} · ${rarityBadge(p.rarity)}</div>
        </div>
        <div style="font-family:'DM Mono',monospace;font-size:13px;color:var(--accent);font-weight:700">${p._score.toFixed(1)}</div>
      </div>`).join('');

  document.getElementById('slotPickerModal').classList.remove('hidden');
}

function assignSlot(playerId) {
  if (_pickerComp === null) return;
  const rosMap = buildRosMap();
  const p = players.find(x => x.id === playerId);
  if (p) {
    if (!optState[_pickerComp][_pickerTeam]) {
      optState[_pickerComp][_pickerTeam] = {
        slots: OPT_SLOTS.map(s => ({ slot: s.name, player: null })),
        proposals: [], selectedProposal: 0
      };
    }
    optState[_pickerComp][_pickerTeam].slots[_pickerSlot].player =
      { ...p, _score: rosMap.get(p.name) ?? (parseFloat(p.projection_score)||0) };
  }
  closeSlotPicker();
  refreshTeamNav();
  renderOptimize();
}

function clearSlot(compKey, teamIdx, slotIdx) {
  if (optState[compKey]?.[teamIdx]?.slots) {
    optState[compKey][teamIdx].slots[slotIdx].player = null;
    refreshTeamNav();
    renderOptimize();
  }
}

function closeSlotPicker() {
  document.getElementById('slotPickerModal').classList.add('hidden');
  _pickerComp = null; _pickerTeam = null; _pickerSlot = null;
}

function parseCSVLine(line) {
  const result = []; let cur = '', inQ = false;
  for (let c of line) {
    if (c === '"') inQ = !inQ;
    else if (c === ',' && !inQ) { result.push(cur); cur = ''; }
    else cur += c;
  }
  result.push(cur); return result;
}

async function sorareApiTest() {
  const input  = document.getElementById('sorareTestSlug')?.value.trim() || '6';
  const rarity = document.getElementById('sorareTestRarity')?.value || 'limited';
  const result = document.getElementById('sorareTestResult');
  if (!result) return;

  result.style.display = 'block';
  result.style.color = '#60a5fa';
  result.textContent = '🔄 Connexion à api.sorare.com...';

  const ENDPOINT = 'https://api.sorare.com/federation/graphql';
  const headers  = { 'Content-Type': 'application/json', 'Accept': 'application/json' };

  async function gql(query) {
    const body   = JSON.stringify({ query });
    const getUrl = ENDPOINT + '?query=' + encodeURIComponent(query);
    const tries  = [
      () => fetch(ENDPOINT, { method: 'POST', headers, body }),
      () => fetch('https://corsproxy.io/?' + encodeURIComponent(ENDPOINT), { method: 'POST', headers, body }),
      () => fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent(getUrl)),
    ];
    for (const t of tries) {
      try { const r = await t(); if (r.ok) return await r.json(); } catch(e) {}
    }
    return null;
  }

  // Utiliser l'ID SRE directement (col B du GW Tracker)
  const query = `{
    baseballPlayer(id: "${input}") {
      displayName
      slug
      lowestPriceAnyCard(inSeason: true, rarity: ${rarity}) {
        ... on BaseballCard {
          season serialNumber
          token {
            latestEnglishAuction { bestBid { amountInFiat { eur } } endDate }
            liveSingleSaleOffer { amounts { eur } }
          }
        }
      }
      tokenPrices(rarity: ${rarity}, last: 5, seasonEligibility: IN_SEASON) {
        nodes { amountInFiat { eur } date }
      }
    }
  }`;

  const data = await gql(query);

  if (!data) {
    result.style.color = '#f43f5e';
    result.textContent = '❌ Connexion impossible. Vérifiez votre connexion internet.';
    return;
  }

  if (data.errors) {
    result.style.color = '#f43f5e';
    result.textContent = '❌ Erreur API :\n' + JSON.stringify(data.errors, null, 2);
    return;
  }

  const player = data?.data?.baseballPlayer;
  if (!player) {
    result.style.color = '#f43f5e';
    result.textContent = `❌ ID "${input}" introuvable.\n\nEntrez l'ID SRE depuis la colonne B du GW Tracker.\nEx: 758 (José Ramirez), 6 (Aaron Judge), 1264 (Ohtani)`;
    return;
  }

  let txt = `✅ ${player.displayName} (ID: ${input})\n\n`;

  const lowest = player.lowestPriceAnyCard;
  if (lowest) {
    const auction = lowest.token?.latestEnglishAuction?.bestBid?.amountInFiat?.eur;
    const direct  = lowest.token?.liveSingleSaleOffer?.amounts?.eur;
    const endDate = lowest.token?.latestEnglishAuction?.endDate;
    txt += `📌 Carte In Season ${rarity} disponible :\n`;
    txt += `  Saison ${lowest.season} | N°${lowest.serialNumber}\n`;
    if (endDate) txt += `  Enchère se termine : ${new Date(endDate).toLocaleString('fr-FR')}\n`;
    txt += `  Enchère actuelle : ${auction != null ? auction.toFixed(2) + ' €' : 'Aucune'}\n`;
    txt += `  Direct sale : ${direct != null ? direct.toFixed(2) + ' €' : 'Pas en vente'}\n\n`;
  } else {
    txt += `⚠️ Aucune carte In Season ${rarity} disponible actuellement.\n\n`;
  }

  const prices = player.tokenPrices?.nodes || [];
  if (prices.length) {
    txt += `📊 Dernières ventes In Season ${rarity} :\n`;
    prices.forEach(p => {
      const d = p.date ? new Date(p.date).toLocaleDateString('fr-FR') : '?';
      txt += `  ${d} → ${p.amountInFiat?.eur != null ? p.amountInFiat.eur.toFixed(2) + ' €' : '?'}\n`;
    });
  } else {
    txt += `📊 Aucune vente récente trouvée.`;
  }

  result.style.color = '#10b981';
  result.textContent = txt;
}

function importRoster(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (!data.roster || !Array.isArray(data.roster)) throw new Error('Format invalide — champ "roster" manquant.');

      let added = 0, updated = 0;
      data.roster.forEach(imported => {
        if (!imported.name) return;

        // Chercher par ID exact d'abord, puis par nom normalisé
        let idx = players.findIndex(p => p.id === imported.id);
        if (idx < 0) {
          const normImport = normalizeName(imported.name);
          idx = players.findIndex(p => normalizeName(p.name) === normImport);
        }

        if (idx >= 0) {
          players[idx].inRoster = true;
          players[idx].rarity   = imported.rarity || players[idx].rarity;
          if (imported.cards?.length) {
            // Remplacer toutes les cartes par celles du fichier importé
            players[idx].cards = imported.cards.map(c => ({ ...c }));
          }
          if (!players[idx].team     && imported.team)     players[idx].team     = imported.team;
          if (!players[idx].position && imported.position) players[idx].position = imported.position;
          updated++;
        } else {
          // Nouveau joueur — générer un ID propre
          players.push({
            ...imported,
            id: Date.now() + Math.random(),
            inRoster: true,
          });
          added++;
        }
      });

      savePlayers(players);
      renderRoster();
      renderTable();
      toast(`✅ Import réussi — ${added} ajouté(s), ${updated} mis à jour. Total effectif : ${players.filter(p=>p.inRoster).length}`, 'success');
    } catch(err) {
      toast('Erreur import : ' + err.message, 'error');
    }
    e.target.value = '';
  };
  reader.readAsText(file);
}

function cleanCorruptedCards() {
  if (!confirm('Dédupliquer et nettoyer les cartes de tous les joueurs ?')) return;
  const raw = JSON.parse(localStorage.getItem('sorare_mlb_players') || '[]');
  let fixed = 0;
  raw.forEach(p => {
    const before = (p.cards || []).length;
    const seen = new Set();
    p.cards = Array.isArray(p.cards)
      ? p.cards.filter(c => {
          if (!c || !c.type || !c.rarity) return false;
          const key = `${c.type}|${c.rarity}`;
          if (seen.has(key)) return false;
          seen.add(key);
          return true;
        })
      : [];
    if (p.cards.length !== before) fixed++;
    if (!p.cards.length) p.inRoster = false;
  });
  localStorage.setItem('sorare_mlb_players', JSON.stringify(raw));
  players = raw;
  renderTable();
  toast(`✅ ${fixed} joueur(s) corrigé(s) — doublons supprimés.`, 'success');
}

function importCSVFile(e) {
  const file = e.target.files[0]; if (!file) return;
  const status = document.getElementById('syncStatus');
  status.textContent = 'Lecture du fichier...';
  status.style.color = 'var(--sub2)';
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const text  = ev.target.result;
      const lines = text.split(/\r?\n/).filter(l => l.trim());
      let added = 0, updated = 0;

      for (let i = 2; i < lines.length; i++) {
        const cols = parseCSVLine(lines[i]);
        if (!cols || cols.length < 4) continue;
        const scarcity = (cols[0]||'').trim();
        const name     = (cols[1]||'').trim();
        if (!name || scarcity !== 'Limited') continue;

        let tournoi = '';
        if ((cols[11]||'').includes('In-Season')) tournoi = 'In-Season';
        else if ((cols[11]||'').includes('Classic') || (cols[12]||'').includes('Classic')) tournoi = 'Classic';
        if (!tournoi && lines[i].includes('In-Season')) tournoi = 'In-Season';
        else if (!tournoi) tournoi = 'Classic';

        const row = {
          name,
          position:    name.toLowerCase().includes('ohtani') ? 'DH' : (cols[2]||'').trim(),
          team:        (cols[3]||'').trim(),
          inj_type:    (cols[4]||'').trim(),
          inj_des:     (cols[5]||'').trim(),
          topend_proj: parseFloat(cols[6]) || 0,
          xp_bonus:    parseFloat(cols[7]) || 0,
          gw_proj:     parseFloat(cols[8]) || 0,
          l10:         parseFloat(cols[9]) || 0,
          tournoi,
          age:         (cols[15]||'').trim(),
          asset_id:    (cols[16]||'').trim(),
          updatedAt:   new Date().toISOString(),
        };

        row.projection_score = row.gw_proj || row.topend_proj || 0;
        row.avg_score        = row.l10     || 0;

        const ex = row.asset_id
          ? players.find(p => p.asset_id === row.asset_id)
          : players.find(p => p.name.toLowerCase() === name.toLowerCase() && p.team === row.team);

        if (ex) { Object.assign(ex, row, { id: ex.id, inRoster: ex.inRoster }); updated++; }
        else    { row.id = Date.now() + Math.random(); row.inRoster = false; players.push(row); added++; }
      }

      savePlayers(players); renderTable();
      const msg = '✅ ' + added + ' ajouté(s), ' + updated + ' mis à jour';
      status.style.color = 'var(--green)'; status.textContent = msg;
      toast(msg, 'success');
    } catch(err) {
      status.style.color = 'var(--red)'; status.textContent = '❌ Erreur : ' + err.message;
      toast('Erreur lors de la lecture du fichier.', 'error');
    }
    e.target.value = '';
  };
  reader.readAsText(file, 'UTF-8');
}

function calcCeilingDetail(stats, isPitcher) {
  const g = k => {
    if (!stats) return 0;
    const norm = s => s.toLowerCase().replace(/[\s\-_\/]/g,'');
    const nk = norm(k);
    for (const [rk, rv] of Object.entries(stats)) {
      if (norm(String(rk)) === nk) return parseFloat(rv) || 0;
    }
    return 0;
  };

  let parts, total;
  if (isPitcher) {
    const ip=g('ip'), k=g('k'), h=g('h'), er=g('er'), bb=g('bb'), hbp=g('hbp'), w=g('w'), sv=g('sv'), hld=g('hld');
    parts = [
      ip  ? `IP ${ip.toFixed(2)}×3 = ${(ip*3).toFixed(1)}`       : null,
      k   ? `K ${k.toFixed(1)}×2 = ${(k*2).toFixed(1)}`           : null,
      h   ? `H ${h.toFixed(1)}×(-0.5) = ${(h*-0.5).toFixed(1)}`   : null,
      er  ? `ER ${er.toFixed(1)}×(-2) = ${(er*-2).toFixed(1)}`     : null,
      bb  ? `BB ${bb.toFixed(1)}×(-1) = ${(bb*-1).toFixed(1)}`     : null,
      hbp ? `HBP ${hbp.toFixed(1)}×(-1) = ${(hbp*-1).toFixed(1)}` : null,
      w   ? `W ${w.toFixed(1)}×5 = ${(w*5).toFixed(1)}`            : null,
      sv  ? `SV ${sv.toFixed(1)}×10 = ${(sv*10).toFixed(1)}`       : null,
      hld ? `HLD ${hld.toFixed(1)}×5 = ${(hld*5).toFixed(1)}`      : null,
    ].filter(Boolean);
    total = ip*3 + k*2 + h*-0.5 + er*-2 + bb*-1 + hbp*-1 + w*5 + sv*10 + hld*5;
  } else {
    const r=g('r'), rbi=g('rbi'), b1=g('1b'), b2=g('2b'), b3=g('3b'), hr=g('hr'), bb=g('bb'), k=g('k'), sb=g('sb'), cs=g('cs'), hbp=g('hbp');
    parts = [
      r   ? `R ${r.toFixed(2)}×3 = ${(r*3).toFixed(1)}`     : null,
      rbi ? `RBI ${rbi.toFixed(2)}×3 = ${(rbi*3).toFixed(1)}` : null,
      b1  ? `1B ${b1.toFixed(2)}×2 = ${(b1*2).toFixed(1)}`   : null,
      b2  ? `2B ${b2.toFixed(2)}×5 = ${(b2*5).toFixed(1)}`   : null,
      b3  ? `3B ${b3.toFixed(2)}×8 = ${(b3*8).toFixed(1)}`   : null,
      hr  ? `HR ${hr.toFixed(2)}×10 = ${(hr*10).toFixed(1)}`  : null,
      bb  ? `BB ${bb.toFixed(2)}×2 = ${(bb*2).toFixed(1)}`    : null,
      k   ? `K ${k.toFixed(2)}×(-1) = ${(k*-1).toFixed(1)}`  : null,
      sb  ? `SB ${sb.toFixed(2)}×5 = ${(sb*5).toFixed(1)}`   : null,
      cs  ? `CS ${cs.toFixed(2)}×(-1) = ${(cs*-1).toFixed(1)}`: null,
      hbp ? `HBP ${hbp.toFixed(2)}×2 = ${(hbp*2).toFixed(1)}`: null,
    ].filter(Boolean);
    total = r*3 + rbi*3 + b1*2 + b2*5 + b3*8 + hr*10 + bb*2 + k*-1 + sb*5 + cs*-1 + hbp*2;
  }
  return { parts, total };
}

let builderComp    = 'challenger';
let builderTeam    = 0;
let builderRarity  = 'Limited';
let builderPickerSlot = null;

// État : builderAllStates[rarity][comp][teamIdx]
let builderAllStates = {
  Limited: { challenger: [null,null,null,null], hotstreak: [null,null,null], champions: [null,null,null] },
  Rare:    { challenger: [null,null,null,null], hotstreak: [null,null,null], champions: [null,null,null] },
};

// Getter rareté courante
function getBuilderStateForRarity() {
  return builderAllStates[builderRarity] || builderAllStates['Limited'];
}
Object.defineProperty(window, 'builderState', { get: getBuilderStateForRarity, configurable: true });

function initBuilderState() {
  builderAllStates = {
    Limited: { challenger: [null,null,null,null], hotstreak: [null,null,null], champions: [null,null,null] },
    Rare:    { challenger: [null,null,null,null], hotstreak: [null,null,null], champions: [null,null,null] },
  };
}

function getBuilderTeamCount() {
  return builderComp === 'challenger' ? 4 : 3;
}

function emptyBuilderSlots() {
  return OPT_SLOTS.map(s => ({ slot: s.name, player: null }));
}

function selectBuilderRarity(r) {
  builderRarity = r;
  document.querySelectorAll('#tab-builder .opt-nav-rarity').forEach(b =>
    b.classList.toggle('active', b.dataset.rarity === r)
  );
  renderBuilder();
}

function selectBuilderComp(comp) {
  builderComp = comp;
  document.querySelectorAll('#builderCompNav .opt-nav-comp').forEach(b =>
    b.classList.toggle('active', b.dataset.comp === comp)
  );
  const btn4 = document.getElementById('builderTeam4Btn');
  if (btn4) btn4.style.display = comp === 'challenger' ? '' : 'none';
  if (builderTeam >= getBuilderTeamCount()) { builderTeam = 0; }
  document.querySelectorAll('#builderTeamNav .opt-nav-team').forEach(b =>
    b.classList.toggle('active', parseInt(b.dataset.team) === builderTeam)
  );
  refreshBuilderNav();
  renderBuilder();
}

function selectBuilderTeam(idx) {
  builderTeam = idx;
  refreshBuilderNav();
  renderBuilder();
}

function resetBuilderTeam() {
  builderState[builderComp][builderTeam] = null;
  refreshBuilderNav();
  renderBuilder();
}

function validateBuilderTeam() {
  const slots = builderState[builderComp][builderTeam];
  if (!slots) { toast('Équipe vide.', 'error'); return; }
  const filled = slots.filter(a => a.player).length;

  // Marquer comme validée
  getBuilderStateForRarity()[builderComp][builderTeam] = slots;
  slots._validated = true;

  // Retirer chaque joueur de cette équipe des autres équipes du builder
  let removed = 0;
  slots.forEach(a => {
    if (!a.player) return;
    for (const comp of ['challenger','hotstreak','champions']) {
      const teamCount = comp === 'challenger' ? 4 : 3;
      for (let ti = 0; ti < teamCount; ti++) {
        if (comp === builderComp && ti === builderTeam) continue;
        const other = builderState[comp]?.[ti];
        if (!other) continue;
        const idx = other.findIndex(s => s.player?.id === a.player.id);
        if (idx >= 0) { other[idx].player = null; removed++; }
      }
    }
  });

  refreshBuilderNav();
  const comp = COMP_DEFS.find(c => c.key === builderComp);
  let msg = `✅ ${comp.label} · Équipe ${builderTeam+1} validée — ${filled}/7 slots.`;
  if (removed > 0) msg += ` ${removed} joueur(s) retiré(s) d'autres équipes.`;
  toast(msg, 'success');
}

function refreshBuilderNav() {
  document.querySelectorAll('#builderTeamNav .opt-nav-team').forEach(b => {
    const idx   = parseInt(b.dataset.team);
    const slots = builderState[builderComp]?.[idx];
    b.classList.toggle('filled', !!(slots?._validated));
    b.classList.toggle('active', idx === builderTeam);
    b.style.display = (idx === 3 && builderComp !== 'challenger') ? 'none' : '';
  });
}

function renderBuilder() {

  if (!builderState[builderComp][builderTeam]) {
    builderState[builderComp][builderTeam] = emptyBuilderSlots();
  }

  const slots = builderState[builderComp][builderTeam];
  const total = slots.reduce((s, a) => s + (a.player ? getBuilderScore(a.player) : 0), 0);
  const filled = slots.filter(a => a.player).length;

  const comp = COMP_DEFS.find(c => c.key === builderComp);

  const slotCards = slots.map((a, si) => {
    const p = a.player;
    const onRemove = p ? `removeBuilderPlayer(${si})` : null;
    const dateStr  = p ? (p.spDate || p.opps || '') : '';
    const gCount   = p ? Math.min(parseInt(p.g)||0, 4) : 0;
    const gLabel   = gCount > 0 ? `${gCount} match${gCount>1?'s':''}` : '';

    let cardHtml;
    if (!p) {
      // Slot vide cliquable
      cardHtml = `<div class="sorare-card empty" onclick="openBuilderPicker(${si})"
        style="cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;width:110px;height:160px;border-radius:10px;border:1.5px dashed rgba(201,168,76,.3);background:rgba(201,168,76,.04)">
        <div style="font-size:28px;color:rgba(201,168,76,.3)">+</div>
        <div style="font-size:9px;font-weight:800;color:rgba(201,168,76,.4);text-transform:uppercase;letter-spacing:.5px">${a.slot}</div>
      </div>`;
    } else {
      const rarity  = builderRarity.toLowerCase();
      const initials = p.name.split(/\s+/).map(w=>w[0]).join('').slice(0,3).toUpperCase();
      const psoGW   = p.position === 'SP' ? (p.spPso ?? p.gwPso) : p.gwPso;
      const ceil    = parseFloat(p.ceiling) || null;
      const psoColor  = psoGW  != null ? rankColor(null,null,psoGW)  : 'rgba(255,255,255,.7)';
      const ceilColor = ceil   != null ? rankColor(null,null,ceil)   : 'rgba(255,255,255,.7)';

      const rankEntry = window._psoGWRankMap?.get(normalizeName(p.name));
      const rankBadge = rankEntry ? `<div style="position:absolute;top:5px;right:6px;font-size:9px;font-weight:800;color:rgba(255,255,255,.85);background:rgba(0,0,0,.45);border-radius:4px;padding:1px 4px;letter-spacing:.2px;z-index:3">#${rankEntry.rank}</div>` : '';

      cardHtml = `<div class="sorare-card ${rarity}" onclick="openBuilderPicker(${si})" style="cursor:pointer;width:110px;height:160px">
        <div class="sorare-card-slot">${a.slot}</div>
        ${rankBadge}
        <div class="sorare-card-actions">
          <button onclick="event.stopPropagation();removeBuilderPlayer(${si})" style="color:#f43f5e" title="Retirer">✕</button>
        </div>
        <div class="sorare-card-initials">${initials}</div>
        <div class="sorare-card-pos-team">${p.position||'?'} · ${p.team||'?'}</div>
        <div class="sorare-card-footer">
          <div class="sorare-card-stats-labels"><span>PSo GW</span><span>Ceiling</span></div>
          <div class="sorare-card-stats-values">
            <span style="color:${psoColor}">${psoGW!=null?psoGW.toFixed(1):'—'}</span>
            <span style="color:${ceilColor}">${ceil!=null?ceil.toFixed(1):'—'}</span>
          </div>
          <div class="sorare-card-name">${p.name}</div>
          ${(p.cards||[]).some(c=>c.type==='inseason') ? `<div style="font-size:8px;font-weight:700;color:#60a5fa;text-align:center;letter-spacing:.3px;opacity:.9;padding-bottom:2px">IN SEASON</div>` : ''}
        </div>
      </div>`;
    }

    return `<div class="sorare-team-slot">
      ${cardHtml}
      ${dateStr ? `<div class="sorare-slot-date">${dateStr}</div>` : '<div class="sorare-slot-date" style="opacity:0">—</div>'}
      ${gLabel ? `<div style="font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;color:var(--accent);text-align:center">${gLabel}</div>` : ''}
    </div>`;
  }).join('');

  body.innerHTML = `
    <div class="selected-team-banner" style="margin-bottom:14px">
      <span style="color:${comp.color};font-weight:700;font-size:13px">${comp.icon} ${comp.label} · Équipe ${builderTeam+1}</span>
      <span style="font-family:'DM Mono',monospace;font-size:14px;color:var(--accent);margin-left:8px">${total.toFixed(1)} pts</span>
      <span style="font-size:11px;color:var(--sub);margin-left:4px">${filled}/7 slots · <i>Cliquez sur un slot pour choisir un joueur</i></span>
    </div>
    <div class="sorare-team-grid">${slotCards}</div>`;
}

function getBuilderScore(p) {
  if (!p) return 0;
  if (p.position === 'RP') return parseFloat(p.ceiling) || 0; // RP → toujours Ceiling
  if (p.position === 'SP' && p.spPso != null) return p.spPso;
  if (p.gwPso != null) return p.gwPso;
  return parseFloat(p.ceiling) || 0;
}

// Retourne toutes les positions jouables (gère les joueurs two-way)
function getPlayerPositions(p) {
  const pos = [p.position].filter(Boolean);
  // Ohtani : DH + SP
  if (normalizeName(p.name) === 'shohei ohtani') {
    if (!pos.includes('SP')) pos.push('SP');
    if (!pos.includes('DH')) pos.push('DH');
  }
  return pos;
}
function removeBuilderPlayer(slotIdx) {
  if (!builderState[builderComp][builderTeam]) return;
  builderState[builderComp][builderTeam][slotIdx].player = null;
  renderBuilder();
}

// ── Picker ──
let builderCardFilter = ''; // '' | 'inseason' | 'classic'

function setBuilderCardFilter(f) {
  builderCardFilter = f;
  ['All','IS','Classic'].forEach(k => {
    const el = document.getElementById('bpFilter' + k);
    if (el) el.classList.remove('active');
  });
  const activeId = f === 'inseason' ? 'bpFilterIS' : f === 'classic' ? 'bpFilterClassic' : 'bpFilterAll';

function openBuilderPicker(slotIdx) {

function closeBuilderPicker() {
  const overlay = document.getElementById('builderPickerOverlay');
  const sheet   = document.getElementById('builderPickerSheet');
  sheet.style.transform = 'translateY(100%)';
  setTimeout(() => {
    overlay.style.display = 'none';
    sheet.style.display   = 'none';
  }, 250);
  builderPickerSlot = null;
}

function renderBuilderPicker() {
  if (builderPickerSlot === null) return;
  const slot    = OPT_SLOTS[builderPickerSlot];
  const search  = (document.getElementById('builderPickerSearch')?.value || '').toLowerCase();
  const list    = document.getElementById('builderPickerList');

  // Joueurs déjà placés dans cette équipe
  const usedIds = new Set(
    (builderState[builderComp][builderTeam] || [])
      .filter((a, i) => i !== builderPickerSlot && a.player)
      .map(a => a.player.id)
  );

  const eligible = players.filter(p => {
    if (!p.inRoster) return false;
    if (!getPlayerPositions(p).some(pos => slot.positions.includes(pos))) return false;
    if (usedIds.has(p.id)) return false;
    const cards = (p.cards||[]).filter(c => {
      if (c.rarity !== builderRarity) return false;
      if (builderCardFilter && c.type !== builderCardFilter) return false;
      return true;
    });
    if (!cards.length) return false;
    if (search && !p.name.toLowerCase().includes(search)) return false;
    return true;
  }).sort((a, b) => {
    // Tri par PSo GW (SP → spPso, RP → ceiling, autres → gwPso)
    const scoreA = a.position === 'RP' ? (parseFloat(a.ceiling)||0) : (a.position === 'SP' ? (a.spPso ?? a.gwPso ?? 0) : (a.gwPso ?? 0));
    const scoreB = b.position === 'RP' ? (parseFloat(b.ceiling)||0) : (b.position === 'SP' ? (b.spPso ?? b.gwPso ?? 0) : (b.gwPso ?? 0));
    return scoreB - scoreA;
  });

  if (!eligible.length) {
    list.innerHTML = `<div style="padding:20px;text-align:center;color:var(--sub)">Aucun joueur disponible pour ce slot.</div>`;
    return;
  }

  list.innerHTML = eligible.map(p => {
    const psoGW = p.position === 'SP' ? (p.spPso ?? p.gwPso) : p.gwPso;
    const ceil  = parseFloat(p.ceiling) || null;
    const rarity = builderRarity.toLowerCase();
    const rarityColor = rarity === 'rare' ? '#e8401c' : '#c9a84c';
    const gCount = Math.min(parseInt(p.g)||0, 4);
    const gLabel = gCount > 0 ? `${gCount} match${gCount>1?'s':''}` : '';

    // Vérifier si ce joueur est déjà assigné dans une autre équipe du builder
    let conflictLabel = '';
    for (const comp of ['challenger','hotstreak','champions']) {
      const teamCount = comp === 'challenger' ? 4 : 3;
      for (let ti = 0; ti < teamCount; ti++) {
        // Ignorer l'équipe courante
        if (comp === builderComp && ti === builderTeam) continue;
        const slots = builderState[comp]?.[ti];
        if (!slots) continue;
        const found = slots.find(a => a.player?.id === p.id);
        if (found) {
          const compDef = COMP_DEFS.find(c => c.key === comp);
          conflictLabel = `${compDef?.label || comp} · Équipe ${ti + 1}`;
          break;
        }
      }
      if (conflictLabel) break;
    }

    const isConflict  = !!conflictLabel;
    const borderColor = isConflict ? '#e8401c' : 'var(--border)';
    const hoverColor  = isConflict ? '#e8401c' : rarityColor;

    return `<div onclick="placeBuilderPlayer(${p.id})"
      style="display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:8px;cursor:pointer;
             border:1.5px solid ${borderColor};margin-bottom:6px;background:${isConflict?'rgba(232,64,28,.06)':'var(--card)'};transition:border-color .12s"
      onmouseover="this.style.borderColor='${hoverColor}'" onmouseout="this.style.borderColor='${borderColor}'">
      <div style="width:36px;height:52px;border-radius:6px;background:linear-gradient(160deg,${rarity==='rare'?'#2a0800,#7a2000':'#2a1f00,#5a3e00'});
        border:1px solid ${rarityColor};display:flex;align-items:center;justify-content:center;
        font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:900;color:${rarityColor};opacity:.8;flex-shrink:0">
        ${p.name.split(/\s+/).map(w=>w[0]).join('').slice(0,2).toUpperCase()}
      </div>
      <div style="flex:1;min-width:0">
        <div style="font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.name}</div>
        <div style="font-size:11px;color:var(--sub2)">${p.team||'?'} · ${p.position||'?'}</div>
        <div style="display:flex;gap:8px;margin-top:2px;font-family:'DM Mono',monospace;font-size:11px">
          <span style="color:${psoGW!=null?rankColor(null,null,psoGW):'var(--sub)'}">PSo ${psoGW!=null?psoGW.toFixed(1):'—'}</span>
          <span style="color:${ceil!=null?rankColor(null,null,ceil):'var(--sub)'}">Ceil ${ceil!=null?ceil.toFixed(1):'—'}</span>
        </div>
        ${isConflict ? `<div style="font-size:10px;font-weight:700;color:#e8401c;margin-top:2px">⚠️ ${conflictLabel}</div>` : ''}
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0">
        ${p.spDate || p.opps ? `<div style="font-size:10px;color:var(--sub2)">${p.spDate||p.opps||''}</div>` : ''}
        ${gLabel ? `<div style="font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;color:var(--accent)">${gLabel}</div>` : ''}
      </div>
    </div>`;
  }).join('');
}

function placeBuilderPlayer(playerId) {
  if (builderPickerSlot === null) return;
  const p = players.find(x => x.id === playerId);
  if (!p) return;
  if (!builderState[builderComp][builderTeam]) {
    builderState[builderComp][builderTeam] = emptyBuilderSlots();
  }
  builderState[builderComp][builderTeam][builderPickerSlot].player = p;
  closeBuilderPicker();
  renderBuilder();
}

function loadSPData() {
  try { return JSON.parse(localStorage.getItem(SP_KEY) || '[]'); }
  catch { return []; }
}
function saveSPData(d) { localStorage.setItem(SP_KEY, JSON.stringify(d)); }

function importSPFile(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const lines = ev.target.result.split(/\r?\n/).filter(l => l.trim());
      if (!lines.length) throw new Error('Fichier vide');

      const headers = parseCSVLine(lines[0]).map(h =>
        h.trim().toLowerCase().replace(/"/g,'').replace(/^#$/,'rank')
      );
      const nameIdx = headers.findIndex(h => h === 'name');
      const oppIdx  = headers.findIndex(h => h === 'opp');
      const dateIdx = headers.findIndex(h => h === 'date');
      const teamIdx = headers.findIndex(h => h === 'team');
      if (nameIdx < 0) throw new Error(`Colonne "name" introuvable.`);

      const getCol = (cols, h) => { const i = headers.indexOf(h); return i >= 0 ? parseFloat(cols[i]) || 0 : 0; };
      const getStr = (cols, idx) => idx >= 0 ? (cols[idx]||'').trim().replace(/^"|"$/g,'') : '';

      // Supprimer les anciens SP importés (pour éviter les doublons sur réimport)
      players = players.filter(p => p.position !== 'SP' || p.inRoster);

      let added = 0;
      for (let i = 1; i < lines.length; i++) {
        const cols = parseCSVLine(lines[i]);
        if (!cols[nameIdx]?.trim()) continue;

        const ip=getCol(cols,'ip'), k=getCol(cols,'k'), h=getCol(cols,'h');
        const er=getCol(cols,'er'), bb=getCol(cols,'bb'), hbp=getCol(cols,'hbp'), w=getCol(cols,'w');
        const pso = ip*3 + k*2 + h*-0.5 + er*-2 + bb*-1 + hbp*-1 + w*5;
        const tipParts = [
          ip?`IP ${ip.toFixed(1)}×3=${(ip*3).toFixed(1)}`:null,
          k?`K ${k.toFixed(1)}×2=${(k*2).toFixed(1)}`:null,
          h?`H ${h.toFixed(1)}×-0.5=${(h*-0.5).toFixed(1)}`:null,
          er?`ER ${er.toFixed(1)}×-2=${(er*-2).toFixed(1)}`:null,
          bb?`BB ${bb.toFixed(1)}×-1=${(bb*-1).toFixed(1)}`:null,
          hbp?`HBP ${hbp.toFixed(1)}×-1=${(hbp*-1).toFixed(1)}`:null,
          w?`W ${w.toFixed(1)}×5=${(w*5).toFixed(1)}`:null,
        ].filter(Boolean);

        const name = cols[nameIdx].trim().replace(/^"|"$/g,'');
        const date = getStr(cols, dateIdx);
        const team = getStr(cols, teamIdx);
        const opp  = getStr(cols, oppIdx);

        // Chercher un joueur existant avec même nom ET même date → mettre à jour
        const ex = players.find(p =>
          normalizeName(p.name) === normalizeName(name) &&
          p.position === 'SP' &&
          p.spDate === date
        );

        if (ex) {
          ex.spOpp = opp; ex.spPso = pso; ex.spPsoTip = tipParts.join(' | ') + ' = ' + pso.toFixed(1);
          ex.updatedAt = new Date().toISOString();
        } else {
          // Chercher le joueur de base (Mon Effectif) pour reprendre ses infos
          const base = players.find(p =>
            normalizeName(p.name) === normalizeName(name) && p.inRoster
          );
          players.push({
            id:               Date.now() + Math.random(),
            name,
            team:             team || base?.team || '',
            position:         'SP',
            rarity:           base?.rarity || 'Limited',
            cards:            base ? [] : [],
            inRoster:         false,
            spDate:           date,
            spOpp:            opp,
            spPso:            pso,
            spPsoTip:         tipParts.join(' | ') + ' = ' + pso.toFixed(1),
            projection_score: 0, avg_score: 0, last_score: 0, avg_15: 0,
            notes: '', updatedAt: new Date().toISOString(),
          });
          added++;
        }
      }

      saveSPData([]);
      savePlayers(players);
      renderTable();
      toast(`✅ SP — ${added} sortie(s) importée(s) (1 ligne par départ).`, 'success');
    } catch(err) { toast('Erreur : ' + err.message, 'error'); console.error(err); }
    e.target.value = '';
  };
  reader.readAsText(file, 'UTF-8');
}

function importTrackerFile(e) {
  const file = e.target.files[0]; if (!file) return;

  reader.onload = ev => {
    try {
      const XLSX = window.XLSX;
      if (!XLSX) { toast('Erreur : bibliothèque XLSX non chargée.', 'error'); return; }

      const wb   = XLSX.read(ev.target.result, { type: 'array' });
      const data = {};

      // Lire les 3 feuilles
      const sheets = { hitters: 'Current GWH', pitchers: 'Current GWSP', relievers: 'Current GWRP' };
      for (const [type, sheetName] of Object.entries(sheets)) {
        const ws = wb.Sheets[sheetName];
        if (!ws) continue;
        const raw = XLSX.utils.sheet_to_json(ws, { header: 1 });
        // Ligne 0 = en-têtes de groupe, ligne 1 = vrais en-têtes, ligne 2+ = données
        const headers = raw[1] || [];
        // Indices des colonnes clés
        const iCeiling    = 0;  // col A
        const iPlayerName = 3;  // col D
        const iPos        = type === 'hitters' ? 4 : null; // col E seulement pour frappeurs
        const iTeam       = type === 'hitters' ? 5 : 4;    // col F / E
        // Stats : cols 6+
        const statHeaders = headers.slice(type === 'hitters' ? 6 : 5);

        data[type] = [];
        for (let i = 2; i < raw.length; i++) {
          const row = raw[i];
          if (!row || !row[iPlayerName]) continue;
          const obj = {
            name:    String(row[iPlayerName] || '').trim(),
            ceiling: parseFloat(row[iCeiling]) || 0,
            pos:     type === 'hitters' ? String(row[iPos] || '').trim() : (type === 'pitchers' ? 'SP' : 'RP'),
            team:    String(row[iTeam] || '').trim(),
          };
          // Ajouter les stats
          statHeaders.forEach((h, j) => {
            if (h) obj[String(h).toLowerCase()] = row[(type === 'hitters' ? 6 : 5) + j];
          });
          data[type].push(obj);
        }
      }

      saveTrackerData(data);

      // Mettre à jour les joueurs dans la base
      let added = 0, updated = 0;
      const norm = s => (s||'').toLowerCase().replace(/[^a-z]/g,'');
      const mapPos = raw => {
        const p = (raw || '').trim().toUpperCase();
        if (['SP','RP','C','1B','2B','3B','SS','OF','DH'].includes(p)) return p;
        if (p.includes('OF') || p === 'LF' || p === 'CF' || p === 'RF') return 'OF';
        if (p.includes('DH')) return 'DH';
        return p || 'OF';
      };

      for (const [type, rows] of Object.entries(data)) {
        const isPitcher = type !== 'hitters';
        rows.forEach(row => {
          const name = row.name;
          if (!name) return;
          let pos = isPitcher ? row.pos : mapPos(row.pos);
          if (name.toLowerCase().includes('ohtani')) pos = 'DH';

          const ex = players.find(p => normalizeName(p.name) === normalizeName(name));
          if (ex) {
            ex.position      = pos || ex.position;
            ex.team          = row.team || ex.team;
            ex.ceiling       = row.ceiling;
            ex.trackerStats  = row; // stocker toutes les stats du Tracker
            ex.updatedAt     = new Date().toISOString();
            updated++;
          } else {
            players.push({
              id:               Date.now() + Math.random(),
              name,
              team:             row.team || '',
              position:         pos,
              ceiling:          row.ceiling,
              trackerStats:     row,
              rarity:           'Limited',
              cards:            [],
              inRoster:         false,
              projection_score: 0,
              avg_score:        0,
              last_score:       0,
              avg_15:           0,
              notes:            '',
              updatedAt:        new Date().toISOString(),
            });
            added++;
          }
        });
      }

      savePlayers(players);
      players = loadPlayers();
      renderTable();
      const total = Object.values(data).reduce((s,arr) => s+arr.length, 0);
      toast(`✅ GW Tracker importé — ${total} joueurs (${added} ajoutés, ${updated} mis à jour).`, 'success');
    } catch(err) { toast('Erreur : ' + err.message, 'error'); console.error(err); }

  };

function importGWFile(e) {

    try {
      const lines = ev.target.result.split(/\r?\n/).filter(l => l.trim());
      if (!lines.length) throw new Error('Fichier vide');

      // Normaliser les headers
      const headers = parseCSVLine(lines[0]).map(h =>
        h.trim().toLowerCase().replace(/"/g,'').replace(/^#$/,'rank')
      );

      // Trouver les index des colonnes clés
      const iName  = headers.findIndex(h => h === 'name');
      const iB     = headers.findIndex(h => h === 'b');
      const iTeam  = headers.findIndex(h => h === 'team');
      const iOpps  = headers.findIndex(h => h === 'opps');
      const iG     = headers.findIndex(h => h === '#g');
      const iH     = headers.findIndex(h => h === 'h');
      const iR     = headers.findIndex(h => h === 'r');
      const iHR    = headers.findIndex(h => h === 'hr');
      const iRBI   = headers.findIndex(h => h === 'rbi');
      const iSB    = headers.findIndex(h => h === 'sb');
      const iBB    = headers.findIndex(h => h === 'bb');
      const iSO    = headers.findIndex(h => h === 'so');

      if (iName < 0) throw new Error(`Colonne "name" introuvable. Headers: ${headers.join(', ')}`);

      const getStr = (cols, i) => i >= 0 ? (cols[i]||'').trim().replace(/^"|"$/g,'') : '';
      const getNum = (cols, i) => i >= 0 ? parseFloat(cols[i]) || 0 : 0;

      const rows = [];
      for (let i = 1; i < lines.length; i++) {
        const cols = parseCSVLine(lines[i]);
        const name = getStr(cols, iName);
        if (!name) continue;

        const h   = getNum(cols, iH);
        const r   = getNum(cols, iR);
        const hr  = getNum(cols, iHR);
        const rbi = getNum(cols, iRBI);
        const sb  = getNum(cols, iSB);
        const bb  = getNum(cols, iBB);
        const so  = getNum(cols, iSO);

        // PSo GW : R×3 + RBI×3 + H×3 + HR×10 + BB×2 + SO×(-1) + SB×5
        const pso = r*3 + rbi*3 + h*3 + hr*10 + bb*2 + so*-1 + sb*5;

        const tipParts = [
          r   ? `R ${r.toFixed(1)}×3 = ${(r*3).toFixed(1)}`       : null,
          rbi ? `RBI ${rbi.toFixed(1)}×3 = ${(rbi*3).toFixed(1)}` : null,

          hr  ? `HR ${hr.toFixed(1)}×10 = ${(hr*10).toFixed(1)}`  : null,
          bb  ? `BB ${bb.toFixed(1)}×2 = ${(bb*2).toFixed(1)}`    : null,
          so  ? `SO ${so.toFixed(1)}×(-1) = ${(so*-1).toFixed(1)}`: null,
          sb  ? `SB ${sb.toFixed(1)}×5 = ${(sb*5).toFixed(1)}`    : null,
        ].filter(Boolean);

        rows.push({
          name,
          b:      getStr(cols, iB),
          team:   getStr(cols, iTeam),
          opps:   getStr(cols, iOpps),
          g:      getStr(cols, iG),
          pso,
          psoTip: tipParts.join(' | ') + ' = ' + pso.toFixed(1),
        });
      }

      saveGWData(rows);

      let added = 0, updated = 0;
      rows.forEach(row => {
        const ex = players.find(p => normalizeName(p.name) === normalizeName(row.name));
        if (ex) {
          ex.b       = row.b    || ex.b    || '';
          ex.opps    = row.opps || ex.opps || '';
          ex.g       = row.g    || ex.g    || '';
          ex.gwPso   = row.pso;
          ex.gwPsoTip = row.psoTip;
          ex.updatedAt = new Date().toISOString();
          updated++;
        } else {
          players.push({
            id:          Date.now() + Math.random(),
            name:        row.name,
            team:        row.team || '',
            position:    '',
            b:           row.b    || '',
            opps:        row.opps || '',
            g:           row.g    || '',
            gwPso:       row.pso,
            gwPsoTip:    row.psoTip,
            rarity:      'Limited',
            cards:       [],
            inRoster:    false,
            projection_score: 0,
            avg_score:   0,
            last_score:  0,
            avg_15:      0,
            notes:       '',
            updatedAt:   new Date().toISOString(),
          });
          added++;
        }
      });

      savePlayers(players);
      renderTable();
      toast(`✅ RazzBall GW — ${added} ajouté(s), ${updated} mis à jour.`, 'success');
    } catch(err) { toast('Erreur : ' + err.message, 'error'); console.error(err); }

function importRosToPlayers() {

  const mapPos = raw => {
    const p = (raw || '').trim().toUpperCase();
    if (['SP','RP','C','1B','2B','3B','SS','OF','DH'].includes(p)) return p;
    if (p === 'P') return 'SP';
    if (p.includes('SP')) return 'SP';
    if (p.includes('RP') || p.includes('CL') || p.includes('MR')) return 'RP';
    if (p.includes('OF') || p === 'LF' || p === 'CF' || p === 'RF') return 'OF';
    if (p.includes('DH')) return 'DH';

  };

  let added = 0, updated = 0;

  data.forEach(row => {

      last_score:       0,
      avg_15:           0,
      notes:            '',
      updatedAt:        new Date().toISOString(),
    };

    const ex = players.find(p =>
      p.name.toLowerCase() === name.toLowerCase() && p.team === team
    ) || players.find(p => p.name.toLowerCase() === name.toLowerCase());

    if (ex) {
      // Préserver les cartes et notes existantes
      Object.assign(ex, entry, { id: ex.id, inRoster: ex.inRoster, cards: ex.cards || [], notes: ex.notes || '' });
      updated++;
    } else {
      entry.id       = Date.now() + Math.random();
      entry.inRoster = false;
      players.push(entry);
      added++;

// Normalise un nom pour le matching (minuscules, sans accents, sans ponctuation)
function normName(n) {
  return (n || '').toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-z0-9 ]/g, '').trim();
}

function matchRosPlayer(rosName) {
  const norm = normName(rosName);
  return players.find(p => normName(p.name) === norm ||
    norm.includes(normName(p.name)) || normName(p.name).includes(norm));
}

    u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
    u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
    u => `https://thingproxy.freeboard.io/fetch/${u}`,
  ];

  let html = null;

    try {
      wrap.innerHTML = `<div class="ros-loading">⏳ Tentative ${i+1}/${proxies.length}...</div>`;
      const resp = await fetch(proxies[i](url), { signal: AbortSignal.timeout(12000) });
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const t = await resp.text();

    wrap.innerHTML = '<div class="empty-state"><div class="icon">📋</div><p>Importez un CSV Razzball via le bouton ci-dessus.</p></div>';
    return;
  }

  const rows = parseRazzballHTML(html, type);
  if (!rows.length) {
    errEl.innerHTML = `<div class="ros-error">⚠️ Données chargées mais aucun joueur extrait. Essayez d'importer le CSV manuellement.</div>`;
    wrap.innerHTML = '';

  saveRosData();
  toast(`✅ ${rows.length} joueurs RoS chargés (${type})`, 'success');
  renderRos();

// Parse le HTML de Razzball pour extraire le tableau de données
function parseRazzballHTML(html, type) {
  const parser = new DOMParser();
  const doc    = parser.parseFromString(html, 'text/html');
  const tables = doc.querySelectorAll('table');
  const result = [];

  for (const table of tables) {
    const headers = [...table.querySelectorAll('thead th, thead td')].map(th => th.textContent.trim().toLowerCase());
    if (!headers.includes('name') && !headers.includes('player') && !headers.some(h => h.includes('name'))) continue;

    const nameIdx = headers.findIndex(h => h === 'name' || h === 'player' || h.includes('name'));
    if (nameIdx < 0) continue;

    const rows = table.querySelectorAll('tbody tr');
    rows.forEach(tr => {
      const cells = [...tr.querySelectorAll('td')].map(td => td.textContent.trim());
      if (!cells[nameIdx]) return;
      const obj = { name: cells[nameIdx] };
      headers.forEach((h, i) => { if (i !== nameIdx && cells[i] !== undefined) obj[h] = cells[i]; });
      result.push(obj);
    });
    if (result.length > 0) break;
  }
  return result;
}

// ══════════════════════════════════════════════════════
//  PSo GW — Formule simplifiée pour données Razzball hebdo
//  R×3 + RBI×3 + H×3 + HR×10 + BB×2 + K×(-1) + SB×5 + CS×(-1) + HBP×2
// ══════════════════════════════════════════════════════
function calcPSoGW(row) {
  const g = k => {
    const norm = s => s.toLowerCase().replace(/[\s\-_\/]/g,'');
    const nk = norm(k);
    for (const [rk, rv] of Object.entries(row)) {
      if (norm(rk) === nk) return parseFloat(rv) || 0;
    }
    return 0;
  };
  return (
    g('r')   * 3  +
    g('rbi') * 3  +
    g('h')   * 3  +
    g('hr')  * 10 +
    g('bb')  * 2  +
    g('so')  * -1 +
    g('sb')  * 5  +
    g('cs')  * -1 +
    g('hbp') * 2
  );
}

// ══════════════════════════════════════════════════════
//  PSo — Score Sorare officiel MLB
//  Frappeurs : R×3 + RBI×3 + 1B×2 + 2B×5 + 3B×8 + HR×10 + BB×2 + K×(-1) + SB×5 + CS×(-1) + HBP×2
//  Lanceurs  : IP×3 + K×2 + H×(-0.5) + ER×(-2) + BB×(-1) + HBP×(-1) + W×5 + RA×5 + S×10 + Hold×5 + NoHit×30
// ══════════════════════════════════════════════════════
function calcPSo(row, type) {
  const g = k => {
    // Cherche la clé dans l'objet (insensible à la casse, espaces, tirets)
    const norm = s => s.toLowerCase().replace(/[\s\-_\/]/g,'');
    const nk   = norm(k);
    for (const [rk, rv] of Object.entries(row)) {
      if (norm(rk) === nk) return parseFloat(rv) || 0;
    }
    return 0;
  };

  if (type === 'hitters') {
    const h   = g('h');
    const hr  = g('hr');
    const dbl = g('2b');
    const tpl = g('3b');
    const sng = Math.max(0, h - hr - dbl - tpl); // singles = H - HR - 2B - 3B
    return (
      g('r')   * 3   +
      g('rbi') * 3   +
      sng      * 2   +
      dbl      * 5   +
      tpl      * 8   +
      hr       * 10  +
      g('bb')  * 2   +
      g('so')  * -1  + g('k') * -1 + // k ou so selon la source
      g('sb')  * 5   +
      g('cs')  * -1  +
      g('hbp') * 2
    );
  } else {
    // Lanceurs — ip peut être "6.1" = 6 + 1/3 → convertir en décimal
    const ipRaw = g('ip');
    const ipInt = Math.floor(ipRaw);
    const ipFrac = Math.round((ipRaw - ipInt) * 10) / 3; // 0.1 → 1/3, 0.2 → 2/3
    const ip = ipInt + ipFrac;
    return (
      ip          * 3    +
      g('so')     * 2    + g('k') * 2 +
      g('h')      * -0.5 +
      g('er')     * -2   +
      g('bb')     * -1   +
      g('hbp')    * -1   +
      g('w')      * 5    +
      g('sv')     * 10   +
      g('hld')    * 5    + g('hold') * 5 +
      g('ra')     * 5
    );
  }
}

function psoClass(v) {
  if (v >= 50) return 'score-high';
  if (v >= 25) return 'score-mid';
  return 'score-low';
}

function toggleRosSelect(name) {
