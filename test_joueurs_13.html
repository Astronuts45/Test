<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧪 Test — Base de Joueurs</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=Figtree:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js" crossorigin="anonymous"></script>
<style>

:root {
  --bg:        #080a0f;
  --surface:   #0c0f1a;
  --card:      #111520;
  --border:    #1a2035;
  --accent:    #c9a84c;
  --accent2:   #e8401c;
  --limited:   #c9a84c;
  --rare:      #e8401c;
  --super-rare:#a855f7;
  --unique:    #ef4444;
  --green:     #10b981;
  --red:       #f43f5e;
  --text:      #e8eaf0;
  --sub:       #4a5568;
  --sub2:      #718096;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; }
body {
  font-family: 'Figtree', sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  height: 100vh;
}
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: var(--surface); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* ── Sidebar ── */
#sidebar {
  width: 215px;
  min-width: 215px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  transition: width .2s ease;
}
/* ── Mobile mode ── */
body.mobile-mode #sidebar {
  display: none !important;
}
body.mobile-mode #main {
  width: 100vw;
}
body.mobile-mode .page-header {
  padding: 10px 12px;
}
body.mobile-mode .page-title {
  font-size: 16px;
}
body.mobile-mode .filters {
  padding: 6px 12px;
  flex-wrap: wrap;
  gap: 6px;
}
body.mobile-mode .table-wrap {
  font-size: 11px;
}
body.mobile-mode th, body.mobile-mode td {
  padding: 6px 8px;
  white-space: nowrap;
}
body.mobile-mode .btn {
  font-size: 11px;
  padding: 5px 10px;
}
body.mobile-mode .header-actions {
  gap: 4px;
  flex-wrap: wrap;
}
body.mobile-mode .card-quick-btn {
  padding: 4px 10px;
  font-size: 11px;
}
body.mobile-mode .opt-nav-bar {
  padding: 6px 12px;
  gap: 6px;
}
body.mobile-mode .selected-slot-card {
  min-width: 100px;
  padding: 8px;
}
body.mobile-mode .slot-grid {
  gap: 6px;
}
/* Bouton retour sidebar en mode mobile */
#mobileBackBtn {
  display: none;
  position: fixed;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 999;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--sub2);
  padding: 8px 20px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 4px 12px rgba(0,0,0,.4);
}
body.mobile-mode #mobileBackBtn { display: block; }
#mobileModeBtn { transition: all .15s; }
.logo {
  padding: 22px 20px 16px;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(135deg, #0c0f1a, #111520);
}
.logo-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 24px;
  font-weight: 800;
  color: var(--accent);
  letter-spacing: 2px;
}
.logo-sub {
  font-size: 10px;
  color: var(--sub2);
  margin-top: 2px;
  letter-spacing: 3px;
  text-transform: uppercase;
}
.logo-ball { font-size: 28px; float: right; margin-top: -4px; }
nav { padding: 12px 8px; flex: 1; }
.nav-btn {
  display: flex; align-items: center; gap: 10px;
  width: 100%; padding: 10px 14px;
  border: none; background: transparent;
  color: var(--sub2);
  font-family: 'Figtree', sans-serif;
  font-size: 13.5px; font-weight: 500;
  border-radius: 8px; cursor: pointer;
  transition: all .15s; margin-bottom: 2px; text-align: left;
}
.nav-btn:hover { background: var(--card); color: var(--text); }
.nav-btn.active {
  background: linear-gradient(135deg, rgba(201,168,76,.2), rgba(201,168,76,.05));
  color: var(--accent);
  border: 1px solid rgba(201,168,76,.25);
}
.nav-icon { font-size: 16px; width: 20px; text-align: center; }
.sidebar-bottom { padding: 12px; border-top: 1px solid var(--border); }
.sync-btn {
  width: 100%; padding: 9px;
  background: linear-gradient(135deg, var(--accent), #b8953d);
  color: #000; border: none; border-radius: 8px;
  font-family: 'Figtree', sans-serif;
  font-size: 12.5px; font-weight: 700; cursor: pointer;
  transition: opacity .15s;
}
.sync-btn:hover { opacity: .85; }
.sync-btn:disabled { opacity: .4; cursor: default; }
#syncStatus { font-size: 11px; color: var(--sub); margin-top: 6px; text-align: center; min-height: 16px; line-height: 1.3; }

/* ── Main ── */
#main { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
.tab { display: none; flex-direction: column; height: 100%; overflow: hidden; }
.tab.active { display: flex; }

/* ── Page Header ── */
.page-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 24px 12px;
  border-bottom: 1px solid var(--border);
  background: var(--surface); flex-shrink: 0;
}
.page-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 20px; font-weight: 700; letter-spacing: .5px;
}
.header-actions { display: flex; gap: 8px; }
.btn {
  padding: 7px 14px; border: none; border-radius: 7px;
  font-family: 'Figtree', sans-serif;
  font-size: 12.5px; font-weight: 600; cursor: pointer;
  transition: all .15s; display: flex; align-items: center; gap: 5px;
}
.btn-primary { background: var(--accent); color: #000; }
.btn-primary:hover { background: #b8953d; }
.btn-danger { background: var(--red); color: #fff; }
.btn-danger:hover { background: #e11d48; }
.btn-warning { background: #f97316; color: #fff; }
.btn-warning:hover { background: #ea6c0a; }
.btn-ghost { background: var(--card); color: var(--text); border: 1px solid var(--border); }
.btn-ghost:hover { background: var(--border); }
.btn-green { background: var(--green); color: #fff; }
.btn-green:hover { background: #059669; }

/* ── Filters ── */
.filters {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 24px;
  background: var(--surface); border-bottom: 1px solid var(--border);
  flex-wrap: wrap; flex-shrink: 0;
}
.filter-label { font-size: 12px; color: var(--sub); font-weight: 500; }
input[type="text"], select {
  background: var(--card); border: 1px solid var(--border);
  color: var(--text); padding: 6px 10px; border-radius: 7px;
  font-family: 'Figtree', sans-serif; font-size: 12.5px; outline: none;
  transition: border .15s;
}
input[type="text"]:focus, select:focus { border-color: var(--accent); }
input[type="text"] { width: 180px; }
select { cursor: pointer; }
.filter-check { display: flex; align-items: center; gap: 6px; font-size: 12.5px; color: var(--sub2); cursor: pointer; }
.filter-check input { cursor: pointer; accent-color: var(--accent); }

/* ── Table ── */
.table-wrap { flex: 1; overflow: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead th {
  background: var(--card); color: var(--sub);
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: .8px; padding: 10px 14px; text-align: left;
  position: sticky; top: 0; z-index: 2; cursor: pointer;
  user-select: none; border-bottom: 1px solid var(--border); white-space: nowrap;
}
thead th:hover { color: var(--text); }
thead th.sort-asc::after { content: " ↑"; color: var(--accent); }
thead th.sort-desc::after { content: " ↓"; color: var(--accent); }
tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; cursor: pointer; }
tbody tr:hover { background: var(--card); }
tbody tr.selected { background: rgba(201,168,76,.08); }
tbody td { padding: 10px 14px; vertical-align: middle; }

.badge {
  display: inline-block; padding: 2px 8px; border-radius: 20px;
  font-size: 11px; font-weight: 700; font-family: 'DM Mono', monospace;
  letter-spacing: .5px;
}
.badge-limited   { background: rgba(201,168,76,.15); color: var(--limited); }
.badge-rare      { background: rgba(59,130,246,.15); color: var(--rare); }
.badge-super-rare{ background: rgba(168,85,247,.15); color: var(--super-rare); }
.badge-unique    { background: rgba(239,68,68,.15); color: var(--unique); }

/* MLB Positions — couleurs par slot optimiseur */
.pos-badge {
  display: inline-block; padding: 2px 7px; border-radius: 5px;
  font-size: 11px; font-weight: 700; font-family: 'DM Mono', monospace;
  background: var(--border); color: var(--sub2);
}
/* SP → doré */
.pos-SP  { background: rgba(201,168,76,.15); color: #c9a84c; }
/* RP → orange */
.pos-RP  { background: rgba(249,115,22,.15); color: #f97316; }
/* CI : 1B, 3B, DH → violet */
.pos-1B  { background: rgba(139,92,246,.15); color: #a78bfa; }
.pos-3B  { background: rgba(139,92,246,.15); color: #a78bfa; }
.pos-DH  { background: rgba(139,92,246,.15); color: #a78bfa; }
/* MI : C, 2B, SS → bleu */
.pos-C   { background: rgba(59,130,246,.15);  color: #60a5fa; }
.pos-2B  { background: rgba(59,130,246,.15);  color: #60a5fa; }
.pos-SS  { background: rgba(59,130,246,.15);  color: #60a5fa; }
/* OF → vert */
.pos-OF  { background: rgba(16,185,129,.15);  color: #10b981; }

.score { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; }
.score-high { color: var(--green); }
.score-mid  { color: var(--accent); }
.score-low  { color: var(--sub2); }
.roster-check { font-size: 16px; text-align: center; }
.table-footer {
  padding: 8px 24px; font-size: 12px; color: var(--sub);
  background: var(--surface); border-top: 1px solid var(--border); flex-shrink: 0;
}

/* ── Modal ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.75);
  display: flex; align-items: center; justify-content: center;
  z-index: 100; backdrop-filter: blur(4px);
}
.modal-overlay.hidden { display: none; }
.modal {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; padding: 28px; width: 460px;
  max-height: 90vh; overflow-y: auto;
}
.modal h2 {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 20px; font-weight: 700; margin-bottom: 20px; color: var(--accent);
}
.form-row { display: flex; flex-direction: column; gap: 4px; margin-bottom: 14px; }
.form-row label { font-size: 12px; color: var(--sub); font-weight: 500; }
.form-row input, .form-row select { width: 100%; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

/* ── Roster Stats ── */
.roster-stats {
  display: flex; gap: 12px; padding: 12px 24px;
  background: var(--surface); border-bottom: 1px solid var(--border);
  flex-shrink: 0; flex-wrap: wrap;
}
.stat-pill {
  padding: 6px 14px; background: var(--card); border-radius: 20px;
  font-size: 12.5px; font-weight: 600; color: var(--sub2);
  border: 1px solid var(--border);
}
.stat-pill span { color: var(--accent); }

/* ── Compare ── */
.compare-selectors {
  display: flex; gap: 16px; padding: 16px 24px;
  background: var(--surface); border-bottom: 1px solid var(--border);
  align-items: flex-end; flex-shrink: 0;
}
.compare-selectors label { font-size: 12px; color: var(--sub); margin-bottom: 4px; display: block; }
.compare-selectors select { width: 220px; }
.compare-body { flex: 1; overflow-y: auto; padding: 20px 24px; }
.cmp-header { display: grid; grid-template-columns: 190px 1fr 1fr 130px; gap: 12px; margin-bottom: 10px; }
.cmp-header > div {
  font-family: 'Barlow Condensed', sans-serif; font-size: 16px;
  font-weight: 700; text-align: center; padding: 12px 8px;
  border-radius: 8px; background: var(--card);
}
.cmp-row { display: grid; grid-template-columns: 190px 1fr 1fr 130px; gap: 12px; margin-bottom: 8px; align-items: center; }
.cmp-label { font-size: 13px; color: var(--sub2); font-weight: 500; padding: 0 8px; }
.cmp-val {
  text-align: center; font-family: 'DM Mono', monospace;
  font-size: 20px; font-weight: 500; padding: 14px;
  border-radius: 8px; background: var(--card); border: 2px solid transparent;
}
.cmp-val.winner { border-color: var(--accent); color: var(--accent); }
.cmp-winner-label {
  text-align: center; font-size: 12px; color: var(--accent);
  font-weight: 600; padding: 14px 8px;
  background: rgba(201,168,76,.08); border-radius: 8px;
}
.cmp-summary {
  margin-top: 20px; padding: 16px 20px; background: var(--card);
  border-radius: 10px; border: 1px solid var(--border); text-align: center;
}
.cmp-summary-title { font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 700; color: var(--accent); }

/* ── Optimize ── */
.optimize-options {
  display: flex; align-items: center; gap: 16px; padding: 12px 24px;
  background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; flex-wrap: wrap;
}
.check-label { display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 600; cursor: pointer; }
.check-label input { cursor: pointer; accent-color: var(--accent); }
.check-limited    { color: var(--limited); }
.check-rare       { color: var(--rare); }
.check-super-rare { color: var(--super-rare); }
.check-unique     { color: var(--unique); }
.optimize-body { flex: 1; overflow-y: auto; padding: 20px 24px; }

/* ── Optimize nav ── */
.opt-nav-bar {
  display: flex; gap: 6px; padding: 10px 20px;
  background: var(--surface); border-bottom: 1px solid var(--border);
  flex-shrink: 0; flex-wrap: wrap;
}
.opt-nav-rarity {
  padding: 6px 18px; border-radius: 20px; border: 1px solid var(--border);
  background: var(--card); font-family: 'Figtree', sans-serif;
  font-size: 13px; font-weight: 700; cursor: pointer; transition: all .15s;
  opacity: .35;
}
.opt-nav-rarity.active { opacity: 1; background: var(--surface); }
.opt-nav-rarity:hover { opacity: .8; }
.opt-nav-comp {
  padding: 7px 18px; border-radius: 20px; border: 1px solid var(--border);
  background: var(--card); color: var(--sub2);
  font-family: 'Figtree', sans-serif; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all .15s;
}
.opt-nav-comp:hover { color: var(--text); border-color: var(--sub); }
.opt-nav-comp.active { background: var(--surface); color: var(--text); border-color: var(--accent); }
.opt-nav-comp[data-comp="challenger"].active { border-color: #3b82f6; color: #3b82f6; }
.opt-nav-comp[data-comp="hotstreak"].active  { border-color: #f97316; color: #f97316; }
.opt-nav-comp[data-comp="champions"].active  { border-color: #c9a84c; color: #c9a84c; }
.opt-nav-team {
  padding: 5px 16px; border-radius: 8px; border: 1px solid var(--border);
  background: transparent; color: var(--sub2);
  font-family: 'Figtree', sans-serif; font-size: 12.5px; font-weight: 600;
  cursor: pointer; transition: all .15s;
}
.opt-nav-team:hover { background: var(--card); color: var(--text); }
.opt-nav-team.active {
  background: var(--card); color: var(--accent);
  border-color: rgba(201,168,76,.4);
}
.opt-nav-team.filled::after {
  content: ' ✓'; color: var(--green); font-size: 11px;
}

/* ── Competitions layout ── */
.comp-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;
}
.comp-col {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; overflow: hidden;
}
.comp-col-header {
  padding: 12px 16px; display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border);
}
.comp-col-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 17px; font-weight: 800; letter-spacing: .5px;
}
.comp-challenger { border-top: 3px solid #3b82f6; }
.comp-challenger .comp-col-title { color: #3b82f6; }
.comp-hotstreak  { border-top: 3px solid #f97316; }
.comp-hotstreak  .comp-col-title { color: #f97316; }
.comp-champions  { border-top: 3px solid #c9a84c; }
.comp-champions  .comp-col-title { color: #c9a84c; }
.comp-total {
  font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 700;
}
.comp-slot {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 14px; border-bottom: 1px solid var(--border);
  transition: background .1s; min-height: 54px;
}
.comp-slot:last-child { border-bottom: none; }
.comp-slot-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px; font-weight: 800; color: var(--sub);
  width: 52px; flex-shrink: 0;
}
.comp-slot-player { flex: 1; min-width: 0; }
.comp-slot-player-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.comp-slot-player-info { font-size: 11px; color: var(--sub); margin-top: 1px; }
.comp-slot-score {
  font-family: 'DM Mono', monospace; font-size: 12px;
  font-weight: 600; color: var(--accent); flex-shrink: 0;
}
.comp-slot-empty { font-size: 12px; color: var(--red); flex: 1; }
.comp-slot-actions { display: flex; gap: 4px; flex-shrink: 0; }
.comp-slot-btn {
  background: var(--border); border: none; border-radius: 5px;
  color: var(--sub2); font-size: 11px; padding: 3px 7px;
  cursor: pointer; transition: all .15s;
}
.comp-slot-btn:hover { background: var(--surface); color: var(--text); }
.comp-slot.dragging { opacity: .4; }
.comp-slot.drag-over { background: rgba(201,168,76,.08); border-color: var(--accent); }
.opt-score-banner {
  background: linear-gradient(135deg, var(--card), #0e1420);
  border: 1px solid var(--border); border-radius: 12px;
  padding: 16px 24px; margin-bottom: 16px;
  display: flex; align-items: center; justify-content: space-between;
}
.opt-score-val {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 48px; font-weight: 800; color: var(--accent); line-height: 1;
}
.opt-score-label { font-size: 12px; color: var(--sub); margin-top: 4px; }
.opt-slot {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 18px; background: var(--card);
  border: 1px solid var(--border); border-radius: 10px; margin-bottom: 8px;
  transition: border-color .15s;
}
.opt-slot:hover { border-color: rgba(201,168,76,.3); }
.opt-slot-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 16px; font-weight: 800; color: var(--sub); width: 50px; flex-shrink: 0;
}
.opt-player-name { font-weight: 600; font-size: 14px; }
.opt-player-info { font-size: 12px; color: var(--sub); margin-top: 3px; }
.opt-score-pill {
  font-family: 'DM Mono', monospace;
  font-size: 16px; font-weight: 500; color: var(--accent);
  background: rgba(201,168,76,.1); padding: 5px 14px; border-radius: 20px;
}
.opt-empty { color: var(--red); font-size: 13px; }
.opt-warning {
  padding: 10px 14px; background: rgba(244,63,94,.08);
  border: 1px solid rgba(244,63,94,.2); border-radius: 8px;
  color: var(--red); font-size: 12.5px; margin-top: 8px;
}

/* ── Settings ── */
.settings-body { flex: 1; overflow-y: auto; padding: 24px; display: block; }
.settings-section {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 20px 24px; margin-bottom: 16px;
}
.settings-section h3 {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 16px; font-weight: 700; color: var(--accent); margin-bottom: 4px;
}
.settings-section p { font-size: 12px; color: var(--sub); margin-bottom: 14px; line-height: 1.5; }
.setting-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
.setting-row label { font-size: 12.5px; color: var(--sub2); width: 160px; flex-shrink: 0; }
.setting-row input[type="text"], .setting-row select { flex: 1; }
.col-hint {
  font-family: 'DM Mono', monospace; font-size: 11px; color: var(--sub);
  background: var(--card); padding: 8px 12px; border-radius: 6px;
  margin-top: 8px; line-height: 1.8;
}

/* ── Toast ── */
#toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 999; display: flex; flex-direction: column; gap: 8px; }
.toast { padding: 12px 18px; border-radius: 10px; font-size: 13px; font-weight: 500; animation: slideIn .2s ease; max-width: 320px; }
.toast-success { background: var(--green); color: #fff; }
.toast-error   { background: var(--red); color: #fff; }
.toast-info    { background: var(--accent); color: #000; font-weight: 600; }
@keyframes slideIn { from { transform: translateX(40px); opacity:0; } to { transform: translateX(0); opacity:1; } }

.empty-state { text-align: center; padding: 60px 20px; color: var(--sub); }
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }
.empty-state p { font-size: 14px; line-height: 1.6; }

/* ── Rest of Season ── */
.ros-body { flex: 1; overflow-y: auto; padding: 20px 24px; }
.ros-top { display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; align-items: flex-start; }
.ros-section-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 15px; font-weight: 700; color: var(--accent);
  letter-spacing: .5px; margin-bottom: 10px;
}
.ros-chart-wrap {
  flex: 1; min-width: 320px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 16px 20px;
}
.ros-chart-inner { position: relative; height: 220px; }
.ros-legend {
  display: flex; gap: 14px; flex-wrap: wrap;
  margin-top: 10px; font-size: 11px; color: var(--sub2);
}
.ros-legend-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
.ros-kpi-wrap { display: flex; flex-direction: column; gap: 10px; min-width: 200px; }
.ros-kpi {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; padding: 14px 18px;
}
.ros-kpi-val { font-family: 'Barlow Condensed', sans-serif; font-size: 32px; font-weight: 800; color: var(--accent); line-height: 1; }
.ros-kpi-label { font-size: 11px; color: var(--sub); margin-top: 3px; }
.ros-table-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
.ros-table-wrap table { font-size: 12.5px; }
.ros-table-wrap thead th { background: var(--surface); font-size: 10.5px; padding: 8px 12px; }
.ros-table-wrap tbody td { padding: 8px 12px; }
.ros-matched { color: var(--green); font-size: 11px; font-weight: 600; }
.ros-unmatched { color: var(--sub); font-size: 11px; }
.ros-filters {
  display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
  padding: 10px 24px; background: var(--surface);
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.ros-stat-col { color: var(--accent); font-family: 'DM Mono', monospace; }
.ros-stat-col-hi { color: var(--green); font-family: 'DM Mono', monospace; font-weight: 600; }
.ros-loading { text-align: center; padding: 40px; color: var(--sub2); font-size: 13px; }
.ros-error { color: var(--red); padding: 10px 14px; background: rgba(244,63,94,.08); border: 1px solid rgba(244,63,94,.2); border-radius: 8px; font-size: 12.5px; margin-bottom: 12px; }
.tab-badge {
  display: inline-block; font-size: 10px; background: var(--accent);
  color: #000; border-radius: 10px; padding: 1px 6px; margin-left: 4px; font-weight: 700;
}

/* ── Roster group rows ── */
.roster-group-row td {
  background: var(--surface) !important;
  padding: 6px 14px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px; font-weight: 700; letter-spacing: 1px;
  color: var(--accent); text-transform: uppercase;
  border-bottom: 1px solid var(--border);
  cursor: default;
}
.roster-group-row:hover { background: var(--surface) !important; }
.roster-note-input {
  background: transparent; border: none; border-bottom: 1px solid transparent;
  color: var(--sub2); font-family: 'Figtree', sans-serif;
  font-size: 12px; width: 140px; outline: none; padding: 2px 4px;
  transition: border-color .15s;
}
.roster-note-input:focus {
  border-bottom-color: var(--accent); color: var(--text);
}
.roster-note-input::placeholder { color: var(--sub); }
/* ── Proposals ── */
.proposal-card {
  border: 1px solid var(--border); border-radius: 10px;
  margin-bottom: 8px; overflow: hidden; cursor: pointer;
  transition: border-color .15s, background .15s;
}
.proposal-card:hover { border-color: rgba(201,168,76,.4); background: rgba(201,168,76,.02); }
.proposal-card.selected { border-color: var(--accent); background: rgba(201,168,76,.07); }
.proposal-header {
  display: flex; align-items: center; gap: 12px;
  padding: 9px 14px; background: var(--card); border-bottom: 1px solid var(--border);
}
.proposal-rank {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 17px; font-weight: 800; color: var(--sub); width: 24px; flex-shrink: 0;
}
.proposal-total {
  font-family: 'DM Mono', monospace; font-size: 14px;
  font-weight: 700; color: var(--accent);
}
.proposal-choose { margin-left:auto; font-size: 11px; color: var(--sub2); }
.proposal-card.selected .proposal-choose { color: var(--green); font-weight:700; }
.proposal-slots { display: flex; flex-wrap: wrap; gap: 5px; padding: 8px 14px; }
.proposal-pill {
  display: flex; align-items: center; gap: 5px;
  padding: 3px 9px; border-radius: 6px;
  background: var(--surface); border: 1px solid var(--border); font-size: 11.5px;
}
.proposal-pill.diff { border-color: rgba(16,185,129,.35); background: rgba(16,185,129,.06); }
.proposal-pill-slot {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800; color: var(--sub); font-size: 10px; min-width: 32px;
}
.proposal-pill-name { font-weight: 600; color: var(--text); }
.proposal-pill-score { font-family:'DM Mono',monospace; font-size:10px; color:var(--accent); margin-left:3px; }

/* ── Selected team banner ── */
.selected-team-banner {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 14px; background: rgba(201,168,76,.08);
  border: 1px solid rgba(201,168,76,.3); border-radius: 10px;
  margin-bottom: 14px;
}
/* ── Team grid — style Sorare ── */
.sorare-team-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 16px;
  justify-content: center;
  padding: 8px 0;
}
.sorare-team-slot {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}
.sorare-slot-date {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px; font-weight: 700;
  color: var(--sub2);
  text-transform: uppercase;
  letter-spacing: .5px;
  text-align: center;
}
.sorare-slot-dots {
  display: flex; gap: 4px; justify-content: center;
}
.sorare-slot-dot {
  width: 7px; height: 7px; border-radius: 50%;
  border: 1.5px solid var(--sub);
  background: transparent;
}
.sorare-slot-dot.filled { background: var(--accent); border-color: var(--accent); }
.selected-slot-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 8px; padding: 9px 10px 7px;
}
.selected-slot-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px; font-weight: 800; color: var(--sub); letter-spacing: .5px; margin-bottom: 3px;
}
.selected-slot-name { font-weight: 700; font-size: 12px; line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.selected-slot-info { font-size: 10px; color: var(--sub); margin-top: 2px; }
.selected-slot-score { font-family:'DM Mono',monospace; font-size:12px; font-weight:700; color:var(--accent); margin-top:3px; }
.selected-slot-empty { color: var(--sub); font-size: 11px; font-style: italic; }

/* ── Vignette style Sorare ── */
.sorare-card {
  position: relative;
  width: 110px;
  height: 160px;
  border-radius: 10px 10px 6px 6px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  cursor: pointer;
  transition: transform .15s, box-shadow .15s;
  flex-shrink: 0;
}
.sorare-card:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,.5); }
.sorare-card.limited { background: linear-gradient(160deg, #2a1f00, #5a3e00, #2a1f00); border: 1.5px solid #c9a84c; box-shadow: 0 0 10px rgba(201,168,76,.25); }
.sorare-card.rare     { background: linear-gradient(160deg, #2a0800, #7a2000, #2a0800); border: 1.5px solid #e8401c; box-shadow: 0 0 10px rgba(232,64,28,.25); }
.sorare-card.empty    { background: var(--card); border: 1.5px dashed var(--border); opacity: .5; }
.sorare-card.locked   { box-shadow: 0 0 12px rgba(201,168,76,.5); }
.sorare-card-slot {
  position: absolute; top: 6px; left: 7px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 9px; font-weight: 800; letter-spacing: .5px;
  color: rgba(255,255,255,.5);
}
.sorare-card-actions {
  position: absolute; top: 4px; right: 5px;
  display: flex; gap: 3px;
}
.sorare-card-actions button {
  background: rgba(0,0,0,.4); border: none; border-radius: 4px;
  color: rgba(255,255,255,.6); font-size: 10px; width: 18px; height: 18px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all .12s;
}
.sorare-card-actions button:hover { background: rgba(0,0,0,.7); color: #fff; }
.sorare-card-initials {
  flex: 1;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 36px; font-weight: 900;
  letter-spacing: -2px;
  color: rgba(255,255,255,.15);
  text-shadow: 0 0 20px rgba(255,255,255,.05);
  padding-top: 16px;
}
.sorare-card.limited .sorare-card-initials { color: rgba(201,168,76,.3); }
.sorare-card.rare .sorare-card-initials    { color: rgba(232,64,28,.3); }
.sorare-card-pos-team {
  text-align: center;
  font-family: 'DM Mono', monospace;
  font-size: 9px; font-weight: 700;
  color: rgba(255,255,255,.4);
  letter-spacing: .5px;
  padding: 0 6px 4px;
}
.sorare-card.limited .sorare-card-pos-team { color: rgba(201,168,76,.7); }
.sorare-card.rare .sorare-card-pos-team    { color: rgba(232,64,28,.7); }
.sorare-card-footer {
  background: rgba(0,0,0,.55);
  padding: 5px 6px 6px;
  border-top: 1px solid rgba(255,255,255,.07);
}
.sorare-card-stats-labels {
  display: flex; justify-content: space-around;
  font-size: 8px; font-weight: 700; letter-spacing: .3px;
  color: rgba(255,255,255,.35);
  text-transform: uppercase;
  margin-bottom: 2px;
}
.sorare-card-stats-values {
  display: flex; justify-content: space-around;
  font-family: 'DM Mono', monospace;
  font-size: 10px; font-weight: 700;
}
.sorare-card-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px; font-weight: 900;
  text-align: center;
  color: #fff;
  text-transform: uppercase;
  letter-spacing: .5px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  padding: 0 4px 1px;
  line-height: 1.1;
}

/* ── Card buttons ── */
.card-btn-wrap { display: flex; flex-direction: column; gap: 4px; }
.card-add-btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 10px; border-radius: 7px; border: 1px solid var(--border);
  background: var(--card); color: var(--sub2);
  font-family: 'Figtree', sans-serif; font-size: 11px; font-weight: 600;
  cursor: pointer; transition: all .15s; white-space: nowrap;
}
.card-add-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(201,168,76,.08); }
.card-add-btn.classic { border-color: rgba(201,168,76,.2); }
.card-add-btn.inseason { border-color: rgba(59,130,246,.2); color: #60a5fa; }
.card-add-btn.inseason:hover { border-color: #60a5fa; background: rgba(96,165,250,.08); }
.card-chips { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 3px; }
.card-chip {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 7px; border-radius: 5px;
  font-size: 10px; font-weight: 700; cursor: pointer;
  transition: opacity .15s;
}
.card-chip:hover { opacity: .7; }
.card-chip-classic  { background: rgba(201,168,76,.15); color: var(--accent); border: 1px solid rgba(201,168,76,.3); }
.card-chip-inseason { background: rgba(96,165,250,.12); color: #60a5fa; border: 1px solid rgba(96,165,250,.3); }
.card-chip-remove { font-size: 9px; color: var(--sub); margin-left: 2px; }

/* ── Rarity filter buttons ── */
.card-quick-btn {
  padding: 5px 16px; border-radius: 20px; border: 1px solid var(--border);
  font-family: 'Figtree', sans-serif; font-size: 12.5px; font-weight: 700;
  cursor: pointer; transition: all .15s; opacity: .45;
}
.card-quick-btn.limited { background: rgba(201,168,76,.08); color: var(--accent); border-color: rgba(201,168,76,.3); }
.card-quick-btn.limited:hover, .card-quick-btn.limited.active { background: rgba(201,168,76,.18); opacity: 1; border-color: var(--accent); }
.card-quick-btn.rare { background: rgba(232,64,28,.08); color: var(--rare); border-color: rgba(232,64,28,.3); }
.card-quick-btn.rare:hover, .card-quick-btn.rare.active { background: rgba(232,64,28,.18); opacity: 1; border-color: var(--rare); }
/* ── Catégorie filter buttons ── */
.cat-btn-all     { color: var(--sub2); background: var(--card); border-color: var(--border); }
.cat-btn-all.active, .cat-btn-all:hover { opacity:1; background: var(--surface); border-color: var(--sub2); color: var(--text); }
.cat-btn-hitters { color: #60a5fa; background: rgba(96,165,250,.08); border-color: rgba(96,165,250,.3); }
.cat-btn-hitters.active, .cat-btn-hitters:hover { opacity:1; background: rgba(96,165,250,.25); border-color: #60a5fa; box-shadow: 0 0 8px rgba(96,165,250,.3); }
.cat-btn-sp      { color: #c9a84c; background: rgba(201,168,76,.08); border-color: rgba(201,168,76,.3); }
.cat-btn-sp.active, .cat-btn-sp:hover { opacity:1; background: rgba(201,168,76,.25); border-color: #c9a84c; box-shadow: 0 0 8px rgba(201,168,76,.3); }
.cat-btn-rp      { color: #f97316; background: rgba(249,115,22,.08); border-color: rgba(249,115,22,.3); }
.cat-btn-rp.active, .cat-btn-rp:hover { opacity:1; background: rgba(249,115,22,.25); border-color: #f97316; box-shadow: 0 0 8px rgba(249,115,22,.3); }
/* ── Card type badge ── */
.card-type-is  { display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;font-weight:700;background:rgba(96,165,250,.15);color:#60a5fa;border:1px solid rgba(96,165,250,.3); }
.card-type-c   { display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;font-weight:700;background:rgba(201,168,76,.15);color:#c9a84c;border:1px solid rgba(201,168,76,.3); }

/* ── Lock button ── */
.lock-btn {
  background:none;border:none;cursor:pointer;font-size:14px;
  opacity:.3;transition:opacity .15s;padding:0;line-height:1;
}
.lock-btn.locked { opacity:1; }
.lock-btn:hover  { opacity:.8; }

/* ── Injury badge ── */
.inj-badge {
  display:inline-block;padding:1px 6px;border-radius:4px;
  font-size:10px;font-weight:700;
  background:rgba(244,63,94,.15);color:var(--red);
  border:1px solid rgba(244,63,94,.3);margin-left:6px;
}

/* ── Dashboard ── */
.dash-grid {
  display:grid;grid-template-columns:repeat(3,1fr);gap:16px;
  padding:20px 24px;
}
.dash-comp-card {
  background:var(--card);border:1px solid var(--border);
  border-radius:12px;overflow:hidden;
}
.dash-comp-header {
  padding:12px 16px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);
}
.dash-comp-title {
  font-family:'Barlow Condensed',sans-serif;
  font-size:16px;font-weight:800;
}
.dash-team-row {
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 16px;border-bottom:1px solid var(--border);font-size:13px;
}
.dash-team-row:last-child { border-bottom:none; }
.dash-team-label { font-weight:600;color:var(--sub2); }
.dash-team-score { font-family:'DM Mono',monospace;font-size:14px;font-weight:700;color:var(--accent); }
.dash-team-slots { font-size:11px;color:var(--sub); }
.dash-total {
  padding:10px 16px;background:rgba(201,168,76,.06);
  font-family:'DM Mono',monospace;font-size:13px;font-weight:700;
  color:var(--accent);text-align:right;border-top:1px solid var(--border);
}
/* ── Sort arrows ── */
th.sort-asc::after  { content: ' ↑'; color: var(--accent); font-size: 10px; }
th.sort-desc::after { content: ' ↓'; color: var(--accent); font-size: 10px; }
th[onclick] { cursor: pointer; user-select: none; }
th[onclick]:hover { color: var(--accent); }

/* Override layout for single-page */
html, body { height:100%; overflow:hidden; }
body { display:flex; flex-direction:column; }
#main { display:flex; flex-direction:column; flex:1; overflow:hidden; width:100%; }
.tab { display:none; flex-direction:column; flex:1; overflow:hidden; }
.tab.active { display:flex; }
</style>
</head>
<body>
<div id="main">

<!-- Nav GW -->
<div style="display:flex;align-items:center;background:var(--surface);border-bottom:2px solid var(--border);flex-shrink:0;padding:0 16px;gap:4px">
  <button id="gw-btn-lj" class="opt-nav-team active" onclick="switchGW('lj')" style="padding:10px 20px;font-size:13px;font-weight:700">📅 L-J</button>
  <button id="gw-btn-vd" class="opt-nav-team" onclick="switchGW('vd')" style="padding:10px 20px;font-size:13px;font-weight:700">📅 V-D</button>
  <div style="flex:1"></div>
  <button class="btn btn-primary" onclick="document.getElementById('patreonImportFile').click()" style="font-size:11px">📂 Import Patreon</button>
  <input type="file" id="patreonImportFile" accept=".xlsx,.xls" style="display:none" onchange="importPatreonFile(event)">
  <button class="btn btn-green" onclick="syncGWTrackerFromSheets()" style="font-size:11px">🔄 Sync Sheets</button>
  <button class="btn btn-ghost" style="font-size:11px;border-color:rgba(244,63,94,.4);color:#f43f5e" onclick="resetTestData()">🗑</button>
</div>

<div class="tab active" id="tab-players" style="display:flex;flex-direction:column;flex:1;overflow:hidden">
    <div class="page-header">
      <div id="gw-title" class="page-title">📅 L-J — Base de Joueurs</div>
      <div class="header-actions"></div>
    </div>

    <!-- Sélecteur de rareté pour l'ajout -->
    <div style="display:flex;align-items:center;gap:8px;padding:8px 24px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0">
      <span class="filter-label">Rareté d'ajout :</span>
      <button class="card-quick-btn limited active" id="rarityFilterLimited" onclick="toggleRarityFilter('Limited')">Limited</button>
      <button class="card-quick-btn rare" id="rarityFilterRare" onclick="toggleRarityFilter('Rare')">Rare</button>
      <span style="font-size:11px;color:var(--sub);margin-left:6px">— rareté appliquée lors du clic sur + Classique / + In Season</span>
    </div>

    <!-- Filtre catégorie joueur -->
    <div style="display:flex;align-items:center;gap:8px;padding:8px 24px;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0">
      <span class="filter-label">Catégorie :</span>
      <button class="card-quick-btn cat-btn-hitters active" id="catFilterHitters" onclick="setCatFilter('hitters')">⚾ Frappeurs</button>
      <button class="card-quick-btn cat-btn-sp" id="catFilterSP" onclick="setCatFilter('sp')">🥎 SP</button>
      <button class="card-quick-btn cat-btn-rp" id="catFilterRP" onclick="setCatFilter('rp')">🔥 RP</button>
    </div>

    <div class="filters">
      <span class="filter-label">Recherche :</span>
      <input type="text" id="searchInput" placeholder="Nom du joueur..." oninput="renderTable()">
      <span class="filter-label">Poste :</span>
      <select id="filterPos" onchange="renderTable()">
        <option value="">Tous</option>
        <option value="SP">SP — Lanceur Partant</option>
        <option value="RP">RP — Releveur</option>
        <option value="CI">CI — 1B / 3B / DH</option>
        <option value="MI">MI — C / 2B / SS</option>
        <option value="OF">OF — Voltigeur</option>
      </select>
      <span class="filter-label">Équipe :</span>
      <select id="filterTeam" onchange="renderTable()"><option value="">Toutes</option></select>
      <label class="filter-check">
        <input type="checkbox" id="filterRoster" onchange="renderTable()"> Mon effectif seulement
      </label>
    </div>
    <div class="table-wrap">
      <table id="playersTable">
        <thead>
          <tr>
            <th style="width:36px;text-align:center;color:var(--sub)">#</th>
            <th onclick="sortTable('name')" id="pth-name">Nom</th>
            <th onclick="sortTable('team')" id="pth-team">Équipe</th>
            <th onclick="sortTable('position')" id="pth-position">Poste</th>
            <th id="pth-b" title="Droitier / Gaucher / Switch">Bat</th>
            <th id="pth-opps" title="Adversaire cette semaine">Adv</th>
            <th onclick="sortTable('spDate')" id="pth-spDate" title="Date du départ (SP uniquement)">Date</th>
            <th onclick="sortTable('g')" id="pth-g" title="Nombre de matchs cette semaine">#G</th>
            <th onclick="sortTable('psoGW')" id="pth-psoGW">PSo GW</th>
            <th onclick="sortTable('ceiling')" id="pth-ceiling" title="Ceiling projection du GW Tracker">Ceiling</th>
            <th onclick="sortTable('rosPso')" id="pth-rosPso">PSo RoS</th>
            <th style="min-width:180px">Cartes</th>
          </tr>
        </thead>
        <tbody id="playersBody"></tbody>
      </table>
    </div>
    <div class="table-footer" id="tableFooter">0 joueur(s)</div>
  </div>
</div>
<!-- Sync status bar -->
<div id="syncStatusBar" style="display:none;position:fixed;bottom:0;left:0;right:0;padding:8px 16px;font-size:12px;z-index:999"></div>
<div id="toastContainer" style="position:fixed;top:16px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:6px"></div>
<script>
// ══════════════════════════════════════════════════════
//  STORE
// ══════════════════════════════════════════════════════
const DB_KEY       = 'sorare_mlb_players';
const SETTINGS_KEY = 'sorare_mlb_settings';
const GW_KEY       = 'sorare_mlb_gw';
const TRACKER_KEY  = 'sorare_mlb_tracker';
const ROS_KEY      = 'sorare_mlb_ros';
const SP_KEY       = 'sorare_mlb_sp';

function loadPlayers()      { try { return JSON.parse(localStorage.getItem(DB_KEY) || '[]'); } catch { return []; } }
function savePlayers(p)     { localStorage.setItem(DB_KEY, JSON.stringify(p)); }
function loadSettings()     { try { return JSON.parse(localStorage.getItem(SETTINGS_KEY) || '{}'); } catch { return {}; } }
function saveSettingsData(s){ localStorage.setItem(SETTINGS_KEY, JSON.stringify(s)); }

let players    = loadPlayers().map(p => ({
  ...p,
  cards: Array.isArray(p.cards) ? p.cards.filter(c => c && c.type && c.rarity) : []
}));
let selectedId = null;
let sortCol    = 'projection_score';
let sortDir    = 'desc';
let rarityFilter = 'Limited';

function toggleRarityFilter(rarity) {
  rarityFilter = rarity;
  document.getElementById('rarityFilterLimited').classList.toggle('active', rarityFilter === 'Limited');
  document.getElementById('rarityFilterRare').classList.toggle('active', rarityFilter === 'Rare');
  renderTable();
}

// ══════════════════════════════════════════════════════
//  NAV
// ══════════════════════════════════════════════════════
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  const labels = { players:'joueurs', roster:'effectif', compare:'compar', optimize:'optim', builder:'builder', ros:'rest', settings:'param', dashboard:'tableau', start:'débuter' };
  document.querySelectorAll('.nav-btn').forEach(b => {
    if (b.textContent.toLowerCase().includes(labels[name])) b.classList.add('active');
  });
  if (name === 'players')   renderTable();
  if (name === 'roster')    renderRoster();
  if (name === 'compare')   renderCompareSelects();
  if (name === 'settings')  loadSettingsUI();
  if (name === 'ros')       renderRos();
  if (name === 'optimize')  renderOptimize();
  if (name === 'dashboard') renderDashboard();
  if (name === 'builder')   renderBuilder();
}

// ── Filtre assignation (Mon Effectif) ──
let assignFilter = '';

function setAssignFilter(f) {
  assignFilter = f;
  ['All','Free','Used'].forEach(k => {
    const el = document.getElementById('assignFilter' + k);
    if (el) el.classList.remove('active');
  });
  const activeId = f === 'free' ? 'assignFilterFree' : f === 'used' ? 'assignFilterUsed' : 'assignFilterAll';
  const el = document.getElementById(activeId);
  if (el) el.classList.add('active');
  renderRoster();
}

// ── Mode mobile ──
let mobileMode = false;
function toggleMobileMode() {
  mobileMode = !mobileMode;
  document.body.classList.toggle('mobile-mode', mobileMode);
  const btn = document.getElementById('mobileModeBtn');
  if (btn) {
    btn.textContent  = mobileMode ? '🖥 Mode normal' : '📱 Mode mobile';
    btn.style.background  = mobileMode ? 'rgba(96,165,250,.12)' : 'rgba(255,255,255,.04)';
    btn.style.color       = mobileMode ? '#60a5fa' : 'var(--sub2)';
    btn.style.borderColor = mobileMode ? 'rgba(96,165,250,.3)' : 'var(--border)';
  }
}
let catFilter       = 'hitters'; // défaut : Frappeurs
let rosterCatFilter = 'hitters';

const HITTER_POS  = ['C','1B','2B','3B','SS','OF','DH','CI','MI'];
const SP_POS      = ['SP'];
const RP_POS      = ['RP'];

function catMatchFilter(position, cat) {
  if (!cat) return true;
  if (cat === 'hitters')  return HITTER_POS.includes(position);
  if (cat === 'sp')       return SP_POS.includes(position);
  if (cat === 'rp')       return RP_POS.includes(position);
  return true;
}

function updateTableHeaders() {
  const isPitcher = catFilter === 'sp' || catFilter === 'rp';
  // Bat : visible pour frappeurs, masqué pour lanceurs
  const thBat  = document.getElementById('pth-b');
  const thG    = document.getElementById('pth-g');
  const thDate = document.getElementById('pth-spDate');
  if (thBat)  thBat.style.display  = isPitcher ? 'none' : '';
  if (thG)    thG.style.display    = isPitcher ? 'none' : '';
  if (thDate) thDate.style.display = catFilter === 'sp' ? '' : 'none';
}

function setCatFilter(cat) {
  catFilter = cat;
  ['Hitters','SP','RP'].forEach(k => {
    const el = document.getElementById('catFilter' + k);
    if (el) el.classList.remove('active');
  });
  const activeId = cat === 'sp' ? 'catFilterSP' : cat === 'rp' ? 'catFilterRP' : 'catFilterHitters';
  const activeEl = document.getElementById(activeId);
  if (activeEl) activeEl.classList.add('active');
  updateTableHeaders();
  renderTable();
}

function setRosterCatFilter(cat) {
  rosterCatFilter = cat;
  ['All','Hitters','SP','RP'].forEach(k => {
    const el = document.getElementById('rosterCat' + k);
    if (el) el.classList.remove('active');
  });
  const activeId = cat === 'hitters' ? 'rosterCatHitters' : cat === 'sp' ? 'rosterCatSP' : cat === 'rp' ? 'rosterCatRP' : 'rosterCatAll';
  const activeEl = document.getElementById(activeId);
  if (activeEl) activeEl.classList.add('active');
  renderRoster();
}
function getFiltered() {
  const search    = document.getElementById('searchInput').value.toLowerCase();
  const pos       = document.getElementById('filterPos').value;
  const team      = document.getElementById('filterTeam').value;
  const rosterOnly= document.getElementById('filterRoster').checked;

  const CI_POS = ['1B','3B','DH','CI'];
  const MI_POS = ['C','2B','SS','MI'];

  const getPsoGW = p => p.position === 'SP' ? (p.spPso ?? -999) : (getGWPsoCurrent(p) || -999);

  const rosAllF = loadRosData();
  const rosPsoFiltered = new Map();
  const fillF = (data, type) => data.forEach(r => {
    const n = normalizeName(r.name || r.player || '');
    if (n && !rosPsoFiltered.has(n)) rosPsoFiltered.set(n, calcPSo(r, type));
  });
  fillF(rosAllF.hitters   || [], 'hitters');
  fillF(rosAllF.pitchers  || [], 'pitchers');
  fillF(rosAllF.relievers || [], 'pitchers');

  return players.filter(p => {
    if (search && !p.name.toLowerCase().includes(search)) return false;
    if (pos === 'CI' && !CI_POS.includes(p.position)) return false;
    if (pos === 'MI' && !MI_POS.includes(p.position)) return false;
    if (pos && pos !== 'CI' && pos !== 'MI' && p.position !== pos) return false;
    if (team && p.team !== team) return false;
    if (rosterOnly && !p.inRoster) return false;
    if (!catMatchFilter(p.position, catFilter)) return false;
    return true;
  }).sort((a, b) => {
    let va, vb;
    if (sortCol === 'psoGW') {
      va = getPsoGW(a); vb = getPsoGW(b);
    } else if (sortCol === 'ceiling') {
      va = parseFloat(a.ceiling) || 0; vb = parseFloat(b.ceiling) || 0;
    } else if (sortCol === 'rosPso') {
      va = rosPsoFiltered.get(normalizeName(a.name)) ?? -999;
      vb = rosPsoFiltered.get(normalizeName(b.name)) ?? -999;
    } else if (sortCol === 'g') {
      va = parseFloat(a.g) || 0; vb = parseFloat(b.g) || 0;
    } else {
      va = a[sortCol] ?? ''; vb = b[sortCol] ?? '';
    }
    if (!isNaN(parseFloat(va)) && !isNaN(parseFloat(vb))) { va = parseFloat(va); vb = parseFloat(vb); }
    if (va < vb) return sortDir === 'asc' ? -1 : 1;
    if (va > vb) return sortDir === 'asc' ? 1 : -1;
    return 0;
  });
}

function normalizeName(s) {
  return (s || '')
    .toLowerCase()
    .replace(/\s*(jr\.?|sr\.?|ii|iii|iv)\s*$/i, '') // supprimer suffixes
    .replace(/\./g, '')   // supprimer points
    .replace(/\s+/g, ' ') // normaliser espaces
    .trim();
}

function rarityBadge(r) {
  const map = {
    'Limited':    'badge-limited',
    'Rare':       'badge-rare',
    'Super Rare': 'badge-super-rare',
    'Unique':     'badge-unique',
  };
  return `<span class="badge ${map[r]||'badge-limited'}">${r||'Limited'}</span>`;
}

function posBadge(pos) {
  if (!pos || pos === '—') return '—';
  // Groupe Sorare affiché
  const groupLabel = {
    'SP': 'SP', 'RP': 'RP',
    '1B': 'CI', '3B': 'CI', 'DH': 'CI',
    'C':  'MI', '2B': 'MI', 'SS': 'MI',
    'OF': 'OF',
  };
  const label = groupLabel[pos] || pos;
  return `<span class="pos-badge pos-${pos}" title="${pos}">${label}</span>`;
}

function scoreClass(v) {
  v = parseFloat(v) || 0;
  if (v >= 45) return 'score-high';
  if (v >= 28) return 'score-mid';
  return 'score-low';
}

// Couleur dégradée vert→rouge selon le rang (rank=1 = meilleur = vert)
// Si rank/total nuls, utilise le score brut pour un dégradé relatif (0-100)
function rankColor(rank, total, rawScore) {
  if (rawScore != null && (rank == null || total == null)) {
    // Dégradé basé sur le score brut : vert > 40, jaune 20-40, rouge < 20
    const v = parseFloat(rawScore) || 0;
    if (v >= 50) return 'rgb(40, 200, 120)';
    if (v >= 35) return 'rgb(100, 200, 80)';
    if (v >= 20) return 'rgb(220, 180, 40)';
    if (v >= 10) return 'rgb(230, 120, 30)';
    return 'rgb(200, 60, 50)';
  }
  if (!rank || !total) return 'var(--sub2)';
  const ratio = (rank - 1) / Math.max(total - 1, 1);
  const r = Math.round(ratio * 220 + 35);
  const g = Math.round((1 - ratio) * 180 + 30);
  const b = 40;
  return `rgb(${r},${g},${b})`;
}

function fmt(v) { return (parseFloat(v) || 0).toFixed(1); }

function renderTable() {
  updateTeamFilter();
  updateTableHeaders();
  const filtered = getFiltered();
  const tbody = document.getElementById('playersBody');
  tbody.innerHTML = '';

  if (!filtered.length) {
    tbody.innerHTML = '<tr><td colspan="12" style="text-align:center;padding:40px;color:var(--sub)">Aucun joueur trouvé</td></tr>';
    document.getElementById('tableFooter').textContent = '0 joueur(s)';
    return;
  }

  // Construire la map PSo RoS
  const rosAll = loadRosData();
  const rosPsoMap = new Map();
  const fillRosMap = (data, type) => {
    data.forEach(r => {
      const n = normalizeName(r.name || r.player || '');
      if (n && !rosPsoMap.has(n)) rosPsoMap.set(n, calcPSo(r, type));
    });
  };
  fillRosMap(rosAll.hitters   || [], 'hitters');
  fillRosMap(rosAll.pitchers  || [], 'pitchers');
  fillRosMap(rosAll.relievers || [], 'pitchers');

  // Cache GW brutes pour fallback (joueurs sans gwPso stocké)
  const _gwDataCache = loadGWData();

  // Classements par catégorie (frappeurs / SP / RP séparés) — globaux pour les vignettes
  window._psoGWRankMap = new Map();
  window._ceilRankMap  = new Map();
  const psoGWRankMap = window._psoGWRankMap;
  const ceilRankMap  = window._ceilRankMap;

  const catGroups = {
    hitters: players.filter(p => HITTER_POS.includes(p.position)),
    sp:      players.filter(p => p.position === 'SP'),
    rp:      players.filter(p => p.position === 'RP'),
  };

  Object.entries(catGroups).forEach(([, group]) => {
    // PSo GW par groupe
    const withPso = group
      .map(p => {
        let val = p.position === 'SP' ? p.spPso : p.gwPso;
        if (val == null) {
          const raw = _gwDataCache.find(r => normalizeName(r.name||r.player||'') === normalizeName(p.name));
          if (raw) val = calcPSoGW(raw);
        }
        return val != null ? { name: normalizeName(p.name), val } : null;
      })
      .filter(Boolean)
      .sort((a, b) => b.val - a.val);
    withPso.forEach((e, i) => psoGWRankMap.set(e.name, { rank: i + 1, total: withPso.length }));

    // Ceiling par groupe
    const withCeil = group
      .filter(p => p.ceiling)
      .map(p => ({ name: normalizeName(p.name), val: parseFloat(p.ceiling) }))
      .sort((a, b) => b.val - a.val);
    withCeil.forEach((e, i) => ceilRankMap.set(e.name, { rank: i + 1, total: withCeil.length }));
  });

  // Cache GW brutes pour fallback (joueurs sans gwPso stocké)
  // (déjà chargé plus haut)

  filtered.forEach((p, idx) => {
    const tr = document.createElement('tr');
    if (p.id === selectedId) tr.classList.add('selected');
    tr.onclick = () => { selectedId = p.id; renderTable(); };
    const sc    = scoreClass(p.projection_score);
    const cards = p.cards || [];

    // Couleur du nom = rareté active sélectionnée (blanc si aucun filtre)
    const nameColor = rarityFilter === 'Rare'
      ? 'color:#e8401c;font-weight:700'
      : rarityFilter === 'Limited'
        ? 'color:#c9a84c;font-weight:700'
        : 'color:var(--text)';

    const injHtml = (p.inj_type && p.inj_type.trim())
      ? ` <span class="inj-badge" title="${p.inj_des||''}">🤕 ${p.inj_type}</span>`
      : '';
    const rosInfo = getGWInfo(p.name);
    const gColor  = rosInfo.g !== '—' ? (parseInt(rosInfo.g) >= 4 ? 'var(--green)' : parseInt(rosInfo.g) >= 3 ? 'var(--accent)' : 'var(--sub)') : 'var(--sub)';

    // PSo GW : SP → depuis fichier SP, Hitters → depuis fichier GW (stocké ou recalculé)
    let psoGW, psoGWStr, psoGWSc, psoInfo;
    if (p.position === 'SP' && p.spPso != null) {
      psoGW    = p.spPso;
      psoGWStr = psoGW.toFixed(1);
      psoGWSc  = scoreClass(psoGW);
      psoInfo  = p.spPsoTip ? `<span title="${p.spPsoTip}" style="cursor:help;font-size:10px;color:var(--sub);border:1px solid var(--border);border-radius:50%;width:14px;height:14px;display:inline-flex;align-items:center;justify-content:center;margin-left:4px;vertical-align:middle">i</span>` : '';
    } else if (p.gwPsoLJ != null || p.gwPsoVD != null || p.gwPso != null) {
      psoGW    = getGWPsoCurrent(p);
      psoGWStr = psoGW.toFixed(1);
      psoGWSc  = scoreClass(psoGW);
      psoInfo  = p.gwPsoTip ? `<span title="${p.gwPsoTip}" style="cursor:help;font-size:10px;color:var(--sub);border:1px solid var(--border);border-radius:50%;width:14px;height:14px;display:inline-flex;align-items:center;justify-content:center;margin-left:4px;vertical-align:middle">i</span>` : '';
    } else {
      // Fallback : recalcul depuis données GW brutes
      const gwRaw = _gwDataCache.find(r => normalizeName(r.name||r.player||'') === normalizeName(p.name));
      if (gwRaw) {
        psoGW    = calcPSoGW(gwRaw);
        psoGWStr = psoGW.toFixed(1);
        psoGWSc  = scoreClass(psoGW);
        const d  = calcPSoGWDetail(gwRaw);
        const tip = d.parts.length ? d.parts.join(' | ') + ' = ' + d.total.toFixed(1) : '';
        psoInfo  = tip ? `<span title="${tip}" style="cursor:help;font-size:10px;color:var(--sub);border:1px solid var(--border);border-radius:50%;width:14px;height:14px;display:inline-flex;align-items:center;justify-content:center;margin-left:4px;vertical-align:middle">i</span>` : '';
      } else {
        psoGW = null; psoGWStr = '—'; psoGWSc = ''; psoInfo = '';
      }
    }

    // PSo Rest of Season
    const rosPso    = rosPsoMap.get(normalizeName(p.name));
    const rosPsoStr = rosPso != null ? rosPso.toFixed(1) : '—';
    const rosPsoSc  = rosPso != null ? psoClass(rosPso) : '';

    // Classements et couleurs dégradées (par catégorie)
    const psoGWEntry  = psoGWRankMap.get(normalizeName(p.name));
    const ceilEntry   = ceilRankMap.get(normalizeName(p.name));
    const psoGWRank   = psoGWEntry?.rank;
    const ceilRank    = ceilEntry?.rank;
    const psoGWTotal  = psoGWEntry?.total || 1;
    const ceilTotal   = ceilEntry?.total  || 1;
    const rankBadge   = n => n ? `<span style="font-size:9px;color:var(--sub);margin-right:3px;font-weight:600">#${n}</span>` : '';
    const psoGWColor = rankColor(psoGWRank, psoGWTotal);
    const ceilColor  = rankColor(ceilRank, ceilTotal);

    // Tooltip Ceiling
    const isPitcher = ['SP','RP'].includes(p.position);
    const ceilTip = p.trackerStats ? (() => {
      const d = calcCeilingDetail(p.trackerStats, isPitcher);
      return d.parts.length ? d.parts.join(' | ') + ' = ' + d.total.toFixed(1) : '';
    })() : '';
    const ceilInfo = ceilTip ? `<span title="${ceilTip}" style="cursor:help;font-size:10px;color:var(--sub);border:1px solid var(--border);border-radius:50%;width:14px;height:14px;display:inline-flex;align-items:center;justify-content:center;margin-left:4px;vertical-align:middle">i</span>` : '';

    tr.innerHTML = `
      <td style="text-align:center;color:var(--sub);font-size:12px;font-weight:600">${idx + 1}</td>
      <td><b style="${nameColor}">${p.name}</b>${injHtml}</td>
      <td>${p.team || '—'}</td>
      <td>${posBadge(p.position)}</td>
      <td style="font-size:11px;font-weight:700;color:var(--sub2);${catFilter !== 'hitters' ? 'display:none' : ''}">${rosInfo.b}</td>
      <td style="font-size:11px;color:var(--sub2)">${catFilter === 'sp' ? (p.spOpp || '—') : rosInfo.opps}</td>
      <td style="font-size:11px;font-weight:700;color:var(--accent);${catFilter !== 'sp' ? 'display:none' : ''}">${p.spDate || '—'}</td>
      <td style="font-size:12px;font-weight:700;color:${gColor};${catFilter !== 'hitters' ? 'display:none' : ''}">${rosInfo.g}</td>
      <td style="white-space:nowrap">${rankBadge(psoGWRank)}<span style="font-family:'DM Mono',monospace;font-weight:700;color:${psoGWColor}">${psoGWStr}</span>${psoInfo}</td>
      <td style="white-space:nowrap">${rankBadge(ceilRank)}<span style="font-family:'DM Mono',monospace;font-weight:700;color:${ceilColor}">${p.ceiling ? parseFloat(p.ceiling).toFixed(1) : '—'}</span>${ceilInfo}</td>
      <td><span class="score ${rosPsoSc}">${rosPsoStr}</span></td>
      <td onclick="event.stopPropagation()">
        <div style="display:flex;gap:6px;align-items:center">
          <button class="card-add-btn classic" onclick="quickAdd(${p.id},'classic')">+ Classique</button>
          <button class="card-add-btn inseason" onclick="quickAdd(${p.id},'inseason')">+ In Season</button>
        </div>
      </td>
    `;
    tbody.appendChild(tr);
  });

  document.getElementById('tableFooter').textContent =
    `${filtered.length} joueur(s) sur ${players.length}`;

  // Indicateurs de tri
  document.querySelectorAll('[id^="pth-"]').forEach(th => {
    th.classList.remove('sort-asc','sort-desc');
    const col = th.id.replace('pth-','');
    if (col === sortCol) th.classList.add(sortDir === 'asc' ? 'sort-asc' : 'sort-desc');
  });
}

function calcPSoGWDetail(row) {
  const g = k => {
    const norm = s => s.toLowerCase().replace(/[\s\-_\/]/g,'');
    const nk = norm(k);
    for (const [rk, rv] of Object.entries(row)) {
      if (norm(rk) === nk) return parseFloat(rv) || 0;
    }
    return 0;
  };
  const r=g('r'), rbi=g('rbi'), h=g('h'), hr=g('hr'), bb=g('bb'), so=g('so'), sb=g('sb'), cs=g('cs'), hbp=g('hbp');
  const parts = [
    r   ? `R ${r.toFixed(1)}×3 = ${(r*3).toFixed(1)}`     : null,
    rbi ? `RBI ${rbi.toFixed(1)}×3 = ${(rbi*3).toFixed(1)}` : null,
    h   ? `H ${h.toFixed(1)}×3 = ${(h*3).toFixed(1)}`      : null,
    hr  ? `HR ${hr.toFixed(1)}×10 = ${(hr*10).toFixed(1)}`  : null,
    bb  ? `BB ${bb.toFixed(1)}×2 = ${(bb*2).toFixed(1)}`    : null,
    so  ? `K ${so.toFixed(1)}×(-1) = ${(so*-1).toFixed(1)}` : null,
    sb  ? `SB ${sb.toFixed(1)}×5 = ${(sb*5).toFixed(1)}`    : null,
    cs  ? `CS ${cs.toFixed(1)}×(-1) = ${(cs*-1).toFixed(1)}`: null,
    hbp ? `HBP ${hbp.toFixed(1)}×2 = ${(hbp*2).toFixed(1)}`: null,
  ].filter(Boolean);
  const total = r*3 + rbi*3 + h*3 + hr*10 + bb*2 + so*-1 + sb*5 + cs*-1 + hbp*2;
  return { parts, total };
}

function sortTable(col) {
  const numCols = ['psoGW','ceiling','rosPso','last_score','avg_15','g','projection_score'];
  const defaultDir = numCols.includes(col) ? 'desc' : 'asc';
  sortDir = sortCol === col ? (sortDir === 'asc' ? 'desc' : 'asc') : defaultDir;
  sortCol = col;
  renderTable();
}

function updateTeamFilter() {
  const sel = document.getElementById('filterTeam');
  const cur = sel.value;
  const teams = [...new Set(players.map(p => p.team).filter(Boolean))].sort();
  sel.innerHTML = '<option value="">Toutes</option>' + teams.map(t => `<option${t===cur?' selected':''}>${t}</option>`).join('');
}

// ══════════════════════════════════════════════════════
//  CRUD
// ══════════════════════════════════════════════════════
let editingId = null;

function openAddModal() {
  editingId = null;
  document.getElementById('modalTitle').textContent = 'Ajouter un joueur';
  ['fName','fTeam','fNotes'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('fPos').value = '';
  document.getElementById('fRarity').value = 'Limited';
  ['fProj','fAvg','fLast','fAvg15'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('playerModal').classList.remove('hidden');
  document.getElementById('fName').focus();
}

function openEditModal() {
  if (!selectedId) { toast('Sélectionnez un joueur à modifier.', 'error'); return; }
  const p = players.find(x => x.id === selectedId);
  if (!p) return;
  editingId = p.id;
  document.getElementById('modalTitle').textContent = 'Modifier le joueur';
  document.getElementById('fName').value   = p.name || '';
  document.getElementById('fTeam').value   = p.team || '';
  document.getElementById('fPos').value    = p.position || '';
  document.getElementById('fRarity').value = p.rarity || 'Limited';
  document.getElementById('fProj').value   = p.projection_score || '';
  document.getElementById('fAvg').value    = p.avg_score || '';
  document.getElementById('fLast').value   = p.last_score || '';
  document.getElementById('fAvg15').value  = p.avg_15 || '';
  document.getElementById('fNotes').value  = p.notes || '';

}

function closeModal() { document.getElementById('playerModal').classList.add('hidden'); }

function savePlayer() {
  const name = document.getElementById('fName').value.trim();
  if (!name) { toast('Le nom est obligatoire.', 'error'); return; }
  const data = {
    name,
    team:             document.getElementById('fTeam').value.trim(),
    position:         document.getElementById('fPos').value,
    rarity:           document.getElementById('fRarity').value,
    projection_score: parseFloat(document.getElementById('fProj').value) || 0,
    avg_score:        parseFloat(document.getElementById('fAvg').value) || 0,
    last_score:       parseFloat(document.getElementById('fLast').value) || 0,
    avg_15:           parseFloat(document.getElementById('fAvg15').value) || 0,
    notes:            document.getElementById('fNotes').value.trim(),
    updatedAt:        new Date().toISOString(),
  };
  if (editingId) {
    const idx = players.findIndex(p => p.id === editingId);
    if (idx >= 0) players[idx] = { ...players[idx], ...data };
    toast('Joueur modifié.', 'success');
  } else {
    data.id = Date.now();
    data.inRoster = false;
    players.push(data);
    toast('Joueur ajouté.', 'success');
  }
  savePlayers(players);
  closeModal();
  renderTable();
}

function deleteSelected() {
  if (!selectedId) { toast('Sélectionnez un joueur.', 'error'); return; }
  const p = players.find(x => x.id === selectedId);
  if (!confirm(`Supprimer ${p?.name} ?`)) return;
  players = players.filter(x => x.id !== selectedId);
  selectedId = null;
  savePlayers(players);
  renderTable();
  toast('Joueur supprimé.', 'info');
}

function toggleRoster(id) {
  const idx = players.findIndex(p => p.id === id);
  if (idx >= 0) {
    players[idx].inRoster = !players[idx].inRoster;
    savePlayers(players);
    renderTable();
    const p = players[idx];
    toast(p.inRoster ? `${p.name} ajouté à l'effectif ✅` : `${p.name} retiré`, 'info');
  }
}

function removeCard(playerId, cardIdx) {
  if (!confirm('Supprimer cette carte ?')) return;

function removeCardFromRoster(playerId, cardIdx) {

  if (idx < 0) return;
  players[idx].cards.splice(cardIdx, 1);
  if (!players[idx].cards.length) players[idx].inRoster = false;

}

function setCardComp(playerId, cardIdx, compValue) {
  const idx = players.findIndex(p => p.id === playerId);
  if (idx < 0 || !players[idx].cards[cardIdx]) return;
  const existing = players[idx].cards[cardIdx].assignedComp;
  if (existing && compValue && existing !== compValue) {
    toast(`Cette carte est déjà assignée à ${existing}.`, 'error');
    // Remettre le select à la valeur précédente
    renderRoster();
    return;
  }
  players[idx].cards[cardIdx].assignedComp = compValue;
  savePlayers(players);
}

function validateTeam() {
  const state = optState[optComp]?.[optTeam];
  if (!state?.slots) return;
  const comp      = COMP_DEFS.find(c => c.key === optComp);
  const compLabel = `${comp.label} ${optTeam + 1}`;
  const rarity    = getRarities()[0] || 'Limited';
  let assigned    = 0;
  let skipped     = 0;

  state.slots.forEach(a => {
    if (!a.player) return;
    const idx = players.findIndex(p => p.id === a.player.id);
    if (idx < 0) return;
    const cardIdx = players[idx].cards.findIndex(c =>
      c.type === a.player._cardType && c.rarity === rarity
    );
    if (cardIdx >= 0) {
      const existing = players[idx].cards[cardIdx].assignedComp;
      if (existing && existing !== compLabel) {
        skipped++;
        return;
      }
      players[idx].cards[cardIdx].assignedComp = compLabel;
      assigned++;
    }
  });

  // Marquer l'équipe comme validée → affiche ✓ dans le nav
  state.validated = true;
  refreshTeamNav();

  savePlayers(players);

  // ── Synchroniser dans Mon Builder (même rareté) ──
  const bState = builderAllStates[rarity] || builderAllStates['Limited'];
  if (!bState[optComp]) bState[optComp] = [null, null, null, null];
  bState[optComp][optTeam] = state.slots.map(a => ({
    slot:   a.slot,
    player: a.player ? players.find(p => p.id === a.player.id) || a.player : null,
  }));

  let msg = `✅ ${compLabel} validée — ${assigned} joueur(s) assigné(s) et synchronisé(s) dans Mon Builder.`;
  if (skipped > 0) msg += ` ${skipped} ignoré(s) (déjà assigné(s) ailleurs).`;
  toast(msg, skipped > 0 ? 'info' : 'success');
}

function saveCardNote(playerId, cardIdx, val) {
  const idx = players.findIndex(p => p.id === playerId);
  if (idx < 0 || !players[idx].cards[cardIdx]) return;
  players[idx].cards[cardIdx].note = val;
  savePlayers(players);
}

function resetPlayerCards(playerId) {
  const idx = players.findIndex(p => p.id === playerId);
  if (idx < 0) return;
  players[idx].cards    = [];
  players[idx].inRoster = false;
  savePlayers(players);
  renderTable();
  toast('Cartes réinitialisées ✅', 'info');
}

function renderRoster() {
  // Construire le classement RoS
  const rosAll = loadRosData();
  const rosRanking = new Map();
  const buildRanking = (data, type) => {
    [...data].map(r => ({ ...r, _pso: calcPSo(r, type) }))
      .sort((a,b) => b._pso - a._pso)
      .forEach((r, i) => {
        const n = (r.name || r.player || '').trim();
        if (n && !rosRanking.has(n)) rosRanking.set(n, { rank: i+1, pso: r._pso });
      });
  };
  buildRanking(rosAll.hitters   || [], 'hitters');
  buildRanking(rosAll.pitchers  || [], 'pitchers');
  buildRanking(rosAll.relievers || [], 'pitchers');

  const roster = players.filter(p => p.inRoster).map(p => ({
    ...p,
    _pso: rosRanking.get(normalizeName(p.name))?.pso ?? (parseFloat(p.projection_score) || 0)
  }));

  // Maps pour PSo RoS
  const rosPsoMapR   = new Map();
  const fillR = (data, type) => data.forEach(r => {
    const n = normalizeName(r.name || r.player || '');
    if (n && !rosPsoMapR.has(n)) rosPsoMapR.set(n, calcPSo(r, type));
  });
  fillR(rosAll.hitters   || [], 'hitters');
  fillR(rosAll.pitchers  || [], 'pitchers');
  fillR(rosAll.relievers || [], 'pitchers');

  // ── Filtres ──
  const filterPos    = document.getElementById('rosterFilterPos')?.value || '';
  const filterSearch = (document.getElementById('rosterSearch')?.value || '').toLowerCase();
  const CI_POS = ['1B','3B','DH','CI'];
  const MI_POS = ['C','2B','SS','MI'];
  const filtered = roster.filter(p => {
    if (filterPos === 'CI' && !CI_POS.includes(p.position)) return false;
    if (filterPos === 'MI' && !MI_POS.includes(p.position)) return false;
    if (filterPos && filterPos !== 'CI' && filterPos !== 'MI' && p.position !== filterPos) return false;
    if (filterSearch && !p.name.toLowerCase().includes(filterSearch)) return false;
    if (rosterRarityFilter && !(p.cards||[]).some(c => c.rarity === rosterRarityFilter)) return false;
    if (!catMatchFilter(p.position, rosterCatFilter)) return false;
    // Filtre disponibilité
    if (assignFilter === 'free') {
      const hasUnassigned = (p.cards||[]).some(c =>
        (!rosterRarityFilter || c.rarity === rosterRarityFilter) && !c.assignedComp
      );
      if (!hasUnassigned) return false;
    }
    if (assignFilter === 'used') {
      const hasAssigned = (p.cards||[]).some(c =>
        (!rosterRarityFilter || c.rarity === rosterRarityFilter) && c.assignedComp
      );
      if (!hasAssigned) return false;
    }
    return true;
  });

  const tbody = document.getElementById('rosterBody');
  tbody.innerHTML = '';

  // ── Stats header (toujours sur l'effectif complet) ──
  const total    = roster.reduce((s,p) => s + p._pso, 0);
  const byRarity = {};
  const byPos    = {};
  roster.forEach(p => {
    byRarity[p.rarity] = (byRarity[p.rarity]||0) + 1;
    const pos = p.position || '?';
    byPos[pos] = (byPos[pos]||0) + 1;
  });

  const rarityHtml = Object.entries(byRarity).map(([r,n]) =>
    `<div class="stat-pill">${rarityBadge(r)} <span>${n}</span></div>`
  ).join('');

  const posHtml = POS_ORDER
    .filter(pos => byPos[pos])
    .map(pos => `<div class="stat-pill">${posBadge(pos)} <span>${byPos[pos]}</span></div>`)
    .join('');

  document.getElementById('rosterStats').innerHTML = `
    <div class="stat-pill"><span>${roster.length}</span> joueur(s)</div>
    ${rarityHtml}
    <div style="width:1px;background:var(--border);margin:0 4px"></div>
    ${posHtml}
  `;

  // ── Indicateurs de tri ──
  document.querySelectorAll('[id^="rth-"]').forEach(th => {
    th.classList.remove('sort-asc','sort-desc');
    const col = th.id.replace('rth-','');
    if (col === rosterSortCol) th.classList.add(rosterSortDir === 'asc' ? 'sort-asc' : 'sort-desc');
  });

  if (!filtered.length) {
    tbody.innerHTML = '<tr><td colspan="17" style="text-align:center;padding:40px;color:var(--sub)">Aucun joueur trouvé.</td></tr>';
    return;
  }

  // ── Tri ──
  const getPsoGWRoster = p => p.position === 'SP' ? (p.spPso ?? -999) : (p.gwPso ?? -999);
  const sorted = [...filtered].sort((a, b) => {
    let va, vb;
    if (rosterSortCol === 'pso') {
      va = a._pso; vb = b._pso;
    } else if (rosterSortCol === 'psoGW') {
      va = getPsoGWRoster(a); vb = getPsoGWRoster(b);
    } else if (rosterSortCol === 'ceiling') {
      va = parseFloat(a.ceiling) || 0; vb = parseFloat(b.ceiling) || 0;
    } else if (rosterSortCol === 'g') {
      va = parseFloat(a.g) || 0; vb = parseFloat(b.g) || 0;
    } else if (rosterSortCol === 'b') {
      va = a.b || ''; vb = b.b || '';
    } else if (rosterSortCol === 'opps') {
      va = a.opps || ''; vb = b.opps || '';
    } else if (rosterSortCol === 'position') {
      va = POS_ORDER.indexOf(a.position ?? '');
      vb = POS_ORDER.indexOf(b.position ?? '');
      if (va === -1) va = 99;
      if (vb === -1) vb = 99;
    } else {
      va = a[rosterSortCol] ?? '';
      vb = b[rosterSortCol] ?? '';
    }
    if (!isNaN(parseFloat(va)) && !isNaN(parseFloat(vb))) { va = parseFloat(va); vb = parseFloat(vb); }
    if (va < vb) return rosterSortDir === 'asc' ? -1 : 1;
    if (va > vb) return rosterSortDir === 'asc' ? 1 : -1;
    return a.name.localeCompare(b.name);
  });

  // ── Groupement par poste ──
  const groupByPos = rosterSortCol === 'position';
  let lastPos = null;
  let rosterRank = 0;

  sorted.forEach(p => {
    if (groupByPos && p.position !== lastPos) {
      lastPos = p.position;
      const groupCount = byPos[p.position] || 0;
      const sep = document.createElement('tr');
      sep.className = 'roster-group-row';
      sep.innerHTML = `<td colspan="15">
        ${p.position || '—'}
        <span style="font-size:11px;color:var(--sub);font-weight:400;margin-left:8px">${groupCount} joueur${groupCount > 1 ? 's' : ''}</span>
      </td>`;
      tbody.appendChild(sep);
    }

    const cards   = Array.isArray(p.cards) ? p.cards.filter(c => c && c.type && c.rarity) : [];
    const cardsToShow = rosterRarityFilter
      ? cards.map((c, i) => ({ ...c, _realIdx: i })).filter(c => c.rarity === rosterRarityFilter)
      : cards.map((c, i) => ({ ...c, _realIdx: i }));
    const rows = cardsToShow.length > 0 ? cardsToShow : [null];

    // Données communes au joueur
    const rosInfo   = getGWInfo(p.name);
    const gColor    = rosInfo.g !== '—' ? (parseInt(rosInfo.g) >= 4 ? 'var(--green)' : parseInt(rosInfo.g) >= 3 ? 'var(--accent)' : 'var(--sub)') : 'var(--sub)';
    // PSo GW : SP → spPso, autres → gwPso
    let psoGWR, psoGWRStr, psoGWRSc;
    if (p.position === 'SP' && p.spPso != null) {
      psoGWR    = p.spPso;
      psoGWRStr = psoGWR.toFixed(1);
      psoGWRSc  = scoreClass(psoGWR);
    } else if (p.gwPso != null) {
      psoGWR    = p.gwPso;
      psoGWRStr = psoGWR.toFixed(1);
      psoGWRSc  = scoreClass(psoGWR);
    } else {
      psoGWR = null; psoGWRStr = '—'; psoGWRSc = '';
    }
    const rosPsoR   = rosPsoMapR.get(normalizeName(p.name));
    const rosPsoRStr = rosPsoR != null ? rosPsoR.toFixed(1) : '—';
    const rosPsoRSc  = rosPsoR != null ? psoClass(rosPsoR) : '';
    const ceilVal   = p.ceiling ? parseFloat(p.ceiling).toFixed(1) : '—';
    const ceilSc    = p.ceiling ? scoreClass(p.ceiling) : '';

    rows.forEach((card, ci) => {
      rosterRank++;
      const rarity      = card ? card.rarity : (p.rarity || '');
      const cardType    = card ? (card.type === 'classic' ? 'Classique' : 'In Season') : '—';
      const nameColor   = rarity === 'Rare' ? '#e8401c' : rarity === 'Limited' ? '#c9a84c' : '';
      const cardNote    = card ? (card.note || '') : '';
      const hasCardNote = !!(cardNote.trim());
      const realIdx     = card ? card._realIdx : -1;
      const assignedComp = card ? (card.assignedComp || '') : '';

      const compOptions = [
        '',
        'Challenger 1','Challenger 2','Challenger 3','Challenger 4',
        'Hot Streak 1','Hot Streak 2','Hot Streak 3',
        'Champions 1','Champions 2','Champions 3',
      ].map(v => `<option value="${v}"${assignedComp===v?' selected':''}>${v||'— Non assigné'}</option>`).join('');

      const compColor = assignedComp.startsWith('Champions') ? '#c9a84c'
        : assignedComp.startsWith('Hot') ? '#f97316'
        : assignedComp.startsWith('Challenger') ? '#3b82f6' : 'var(--sub)';

      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td style="text-align:center;color:var(--sub);font-size:12px;font-weight:600">${rosterRank}</td>
        <td><b${nameColor ? ` style="color:${nameColor}"` : ''}>${p.name}</b></td>
        <td>${p.team||'—'}</td>
        <td>${posBadge(p.position)}</td>
        <td>${rarityBadge(rarity)}</td>
        <td><span class="${card?.type === 'inseason' ? 'card-type-is' : 'card-type-c'}">${cardType}</span></td>
        <td style="font-size:11px;font-weight:700;color:var(--sub2)">${rosInfo.b}</td>
        <td style="font-size:11px;color:var(--sub2)">${rosInfo.opps}</td>
        <td style="font-size:12px;font-weight:700;color:${gColor}">${rosInfo.g}</td>
        <td><span class="score ${psoGWRSc}">${psoGWRStr}</span></td>
        <td><span class="score ${ceilSc}">${ceilVal}</span></td>
        <td><span class="score ${rosPsoRSc}">${rosPsoRStr}</span></td>
        <td>
          ${card ? `<select onchange="setCardComp(${p.id},${realIdx},this.value)"
            style="background:var(--card);border:1px solid var(--border);color:${compColor};border-radius:6px;padding:3px 6px;font-size:11px;font-weight:600;cursor:pointer">
            ${compOptions}
          </select>` : ''}
        </td>
        <td style="text-align:center">
          ${card ? `<button onclick="openCardNoteModal(${p.id},${realIdx})" title="${hasCardNote ? cardNote.replace(/"/g,'&quot;') : 'Ajouter une note'}"
            style="background:none;border:none;cursor:pointer;font-size:16px;opacity:${hasCardNote ? '1' : '0.3'};transition:opacity .15s"
            onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='${hasCardNote ? '1' : '0.3'}'">📝</button>` : ''}
        </td>
        <td>${card ? `<button class="btn btn-danger" style="padding:4px 10px;font-size:11px"
          onclick="removeCardFromRoster(${p.id},${realIdx});renderRoster()">Retirer</button>` : ''}</td>
      `;
      tbody.appendChild(tr);
    });
  });
}

// ══════════════════════════════════════════════════════
